<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MultiAgents — Week 10: Voting Theory (Part I)</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  display: flex;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
#sidebar {
  width: 268px;
  min-width: 268px;
  background: #161b22;
  border-right: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
.sb-module {
  font-size: 0.67rem;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 700;
  margin-bottom: 4px;
}
.sb-week  { font-size: 0.76rem; color: #8b949e; margin-bottom: 2px; }
.sb-title { font-size: 0.96rem; font-weight: 700; color: #f0f6fc; line-height: 1.35; }
.sb-count {
  display: inline-block;
  background: #21262d;
  color: #8b949e;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 8px;
  border: 1px solid #30363d;
}

#chart-list { padding: 8px 6px; flex: 1; overflow-y: auto; }
#chart-list::-webkit-scrollbar { width: 3px; }
#chart-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

.chart-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background 0.1s;
  color: #8b949e;
  user-select: none;
  border: 1px solid transparent;
}
.chart-item:hover { background: #21262d; color: #c9d1d9; }
.chart-item.active {
  background: #1f3a6e;
  color: #f0f6fc;
  border-color: #388bfd;
}
.chart-item.active .ci-type { color: #79c0ff; opacity: 1; }
.ci-icon  { font-size: 0.95rem; flex-shrink: 0; margin-top: 2px; }
.ci-title { font-size: 0.83rem; font-weight: 600; line-height: 1.3; }
.ci-type  { font-size: 0.66rem; opacity: 0.6; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.07em; }

/* ── Main ────────────────────────────────────────────────────────────────── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#chart-header {
  padding: 13px 22px 11px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
#chart-title-el { font-size: 1rem; font-weight: 700; color: #79c0ff; margin-bottom: 2px; }
#chart-desc-el  { font-size: 0.81rem; color: #8b949e; font-style: italic; }

#diagram-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #0d1117;
  background-image:
    radial-gradient(circle at 1px 1px, #21262d 1px, transparent 0);
  background-size: 24px 24px;
}

#diagram-svg { width: 100%; height: 100%; display: block; cursor: grab; }
#diagram-svg:active { cursor: grabbing; }

/* ── Zoom controls ───────────────────────────────────────────────────────── */
#zoom-controls {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  z-index: 10;
}
.zoom-btn {
  width: 32px;
  height: 32px;
  border: 1px solid #30363d;
  background: #161b22;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  transition: all 0.1s;
  color: #8b949e;
}
.zoom-btn:hover { background: #21262d; color: #79c0ff; border-color: #388bfd; }

/* ── Hint bar ────────────────────────────────────────────────────────────── */
#hint {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7rem;
  color: #484f58;
  pointer-events: none;
  white-space: nowrap;
  transition: opacity 0.2s;
}
#hint.hidden { opacity: 0; }

.state-msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #484f58;
  font-size: 0.9rem;
  text-align: center;
  pointer-events: none;
}
.state-msg.err { color: #f85149; }

/* ── Info panel (slides in from the left of the diagram area) ──────────── */
#info-panel {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  width: 440px;
  max-width: 50vw;
  background: #161b22;
  border-right: 1px solid #30363d;
  z-index: 30;
  transform: translateX(-100%);
  transition: transform 0.26s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  box-shadow: 12px 0 32px rgba(0, 0, 0, 0.45);
}
#info-panel.visible { transform: translateX(0); }

#info-panel-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
  position: relative;
}
#info-panel-header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}
#info-node-badge {
  font-size: 0.68rem;
  font-weight: 700;
  padding: 3px 11px;
  border-radius: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  flex-shrink: 0;
  display: inline-block;
}
#info-node-label {
  font-size: 1.25rem;
  font-weight: 700;
  color: #f0f6fc;
  line-height: 1.35;
  word-break: break-word;
}

.badge-decision { background: #2d2209; color: #e3b341; border: 1px solid #d29922; }
.badge-step     { background: #0d1f38; color: #79c0ff; border: 1px solid #388bfd; }
.badge-start    { background: #0d1f38; color: #79c0ff; border: 1px solid #388bfd; }
.badge-success  { background: #0d1f12; color: #56d364; border: 1px solid #3fb950; }
.badge-failure  { background: #1c0f0e; color: #ff7b72; border: 1px solid #f85149; }
.badge-topic    { background: #1a1036; color: #c084fc; border: 1px solid #a371f7; }
.badge-subtopic { background: #0d2020; color: #2dd4bf; border: 1px solid #14b8a6; }

#info-close {
  width: 30px;
  height: 30px;
  border: 1px solid #30363d;
  background: #0d1117;
  border-radius: 6px;
  cursor: pointer;
  color: #8b949e;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.1s;
}
#info-close:hover { background: #21262d; color: #f0f6fc; border-color: #8b949e; }

#info-panel-body {
  padding: 20px 24px 24px;
  overflow-y: auto;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: #30363d transparent;
}
#info-panel-body::-webkit-scrollbar { width: 6px; }
#info-panel-body::-webkit-scrollbar-track { background: transparent; }
#info-panel-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
#info-panel-body::-webkit-scrollbar-thumb:hover { background: #484f58; }

#info-section-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: #6e7681;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}
#info-note-text {
  font-size: 1rem;
  color: #c9d1d9;
  line-height: 1.75;
}
#info-note-text.empty {
  color: #484f58;
  font-style: italic;
}
</style>
</head>

</div>

<script>
// ═════════════════════════════════════════════════════════════════════════════
// DATA
// ═════════════════════════════════════════════════════════════════════════════
const DATA = {"module": "MultiAgents", "week": 10, "title": "Voting Theory (Part I)", "charts": [{"id": "chart-1", "type": "mindmap", "title": "Week 10 Topic Map", "description": "High-level overview of all major topics covered in Week 10: single-winner voting rules, Condorcet methods, and strategic manipulation.", "nodes": [{"id": "root", "label": "Week 10\nVoting Theory I", "note": "Voting theory studies how groups of agents aggregate individual preferences into a single collective decision. This week covers single-winner rules, Condorcet consistency, and the Gibbard-Satterthwaite impossibility theorem on strategic manipulation."}, {"id": "intro", "label": "Introduction\nto Voting", "note": "Computational social choice sits at the intersection of algorithms, game theory, and economics. It analyses how voting rules aggregate preferences and explores paradoxes and impossibility results that arise in collective decision making."}, {"id": "psrs", "label": "Positional Scoring\nRules", "note": "Positional scoring rules assign points to candidates based on their rank in each voter's ordering. The total score across all voters determines the winner. Examples include Plurality, Borda, Veto, and k-approval."}, {"id": "elim", "label": "Elimination\nMethods", "note": "Elimination-based methods iteratively remove candidates from contention. Instant-Runoff Voting (IRV) removes the candidate with fewest first-place votes each round until one candidate remains."}, {"id": "condorcet", "label": "Condorcet\nPrinciple", "note": "The Condorcet criterion requires electing a candidate who beats every other candidate in pairwise majority comparisons, if such a candidate exists. No positional scoring rule satisfies this for three or more candidates."}, {"id": "manip", "label": "Strategic\nManipulation", "note": "A voting rule is strategyproof if no voter can benefit by misreporting their true preferences. The Gibbard-Satterthwaite theorem shows that any non-dictatorial onto voting rule with three or more candidates is manipulable."}, {"id": "plurality", "label": "Plurality", "note": "Plurality uses scoring vector (1, 0, ..., 0): each voter gives one point to their top-ranked candidate and zero to all others. Simple to compute but can elect candidates opposed by a majority."}, {"id": "borda", "label": "Borda Count", "note": "Borda count uses scoring vector (m-1, m-2, ..., 0): a candidate ranked first gets m-1 points, second gets m-2, and so on. It rewards overall popularity across rankings."}, {"id": "irv", "label": "IRV", "note": "Instant-Runoff Voting repeatedly eliminates the candidate with fewest first-place votes, redistributing those votes to each ballot's next preference. Used in Ireland, Australia, and US ranked-choice elections."}, {"id": "cwinner", "label": "Condorcet Winner", "note": "A Condorcet winner beats every other candidate in head-to-head majority comparisons. It may not exist (Condorcet paradox: preferences can cycle). When one exists, a Condorcet-consistent rule must elect it."}, {"id": "copeland", "label": "Copeland\nRule", "note": "Copeland scores each candidate by pairwise wins (+1) and ties (+0.5). The Condorcet winner, if it exists, scores m-1 and is always elected, making Copeland Condorcet-consistent."}, {"id": "maximin", "label": "Maximin Rule", "note": "Maximin elects the candidate whose worst-case pairwise support is highest. The Condorcet winner's minimum pairwise support exceeds n/2, guaranteeing Condorcet consistency."}, {"id": "dodgson", "label": "Dodgson Rule", "note": "Dodgson scores a candidate by the minimum number of adjacent swaps in voter rankings needed to make them a Condorcet winner. The Condorcet winner scores zero. Computing Dodgson scores is NP-hard."}, {"id": "gs", "label": "Gibbard-\nSatterthwaite", "note": "The Gibbard-Satterthwaite theorem states that for three or more candidates, any resolute voting rule that is onto (every candidate can win) and strategyproof must be a dictatorship. This means all reasonable rules are manipulable."}, {"id": "spref", "label": "Single-Peaked\nPreferences", "note": "Single-peaked preferences lie along a linear order: each voter has a peak, and their utility decreases monotonically in both directions away from that peak. Under single-peaked preferences, the median-voter rule is strategyproof."}], "edges": [{"from": "root", "to": "intro"}, {"from": "root", "to": "psrs"}, {"from": "root", "to": "elim"}, {"from": "root", "to": "condorcet"}, {"from": "root", "to": "manip"}, {"from": "psrs", "to": "plurality"}, {"from": "psrs", "to": "borda"}, {"from": "elim", "to": "irv"}, {"from": "condorcet", "to": "cwinner"}, {"from": "condorcet", "to": "copeland"}, {"from": "condorcet", "to": "maximin"}, {"from": "condorcet", "to": "dodgson"}, {"from": "manip", "to": "gs"}, {"from": "manip", "to": "spref"}]}, {"id": "chart-2", "type": "flowchart", "title": "Instant-Runoff Voting (IRV) Algorithm", "description": "Step-by-step procedure for determining the winner under Instant-Runoff Voting (also known as STV with k=1).", "nodes": [{"id": "start", "label": "Start: n voters,\nm candidates", "shape": "terminal", "variant": "start", "note": "We are given a set of voter rankings over m candidates and want to find the IRV winner."}, {"id": "init", "label": "Initialise: all\ncandidates active", "shape": "rect", "note": "Mark all m candidates as active. Each voter's current top preference is their highest-ranked candidate among active candidates."}, {"id": "count", "label": "Count first-place\nvotes per candidate", "shape": "rect", "note": "For each active candidate, count how many voters currently rank them first (among active candidates only)."}, {"id": "majority", "label": "Any candidate\nhas majority?", "shape": "diamond", "note": "Check if any candidate has strictly more than n/2 first-place votes. A majority ensures a clear winner. For two remaining candidates, one always has a majority."}, {"id": "winner", "label": "WINNER ELECTED", "shape": "terminal", "variant": "success", "note": "The candidate with a majority of first-place votes is elected as the IRV winner."}, {"id": "findmin", "label": "Find candidate\nwith fewest votes", "shape": "rect", "note": "Identify the active candidate with the fewest first-place votes. Use alphabetical or defined tie-breaking if multiple candidates are tied for last place."}, {"id": "elim", "label": "Eliminate that\ncandidate", "shape": "rect", "note": "Remove the weakest candidate from the election. All ballots that had this candidate ranked first now promote the next active candidate on their ballot."}, {"id": "remaining", "label": "Only 1 candidate\nremains?", "shape": "diamond", "note": "If only one candidate is still active, they win by default. In practice this case is covered by the majority check, but this guards against edge cases."}, {"id": "last", "label": "LAST CANDIDATE\nWINS", "shape": "terminal", "variant": "success", "note": "The final remaining active candidate is elected as the IRV winner."}], "edges": [{"from": "start", "to": "init"}, {"from": "init", "to": "count"}, {"from": "count", "to": "majority"}, {"from": "majority", "to": "winner", "label": "Yes"}, {"from": "majority", "to": "findmin", "label": "No"}, {"from": "findmin", "to": "elim"}, {"from": "elim", "to": "remaining"}, {"from": "remaining", "to": "last", "label": "Yes"}, {"from": "remaining", "to": "count", "label": "No"}]}, {"id": "chart-3", "type": "flowchart", "title": "Finding the Condorcet Winner", "description": "Algorithm to determine whether a Condorcet winner exists in a given preference profile and identify it if so.", "nodes": [{"id": "start", "label": "Start: preference\nprofile R, candidates C", "shape": "terminal", "variant": "start", "note": "We have a set of voter rankings over candidates and want to know if any candidate beats all others in pairwise majority comparisons."}, {"id": "pick", "label": "Pick candidate c\nas Condorcet candidate", "shape": "rect", "note": "Start with the first candidate as a potential Condorcet winner. We will test it against all others."}, {"id": "others", "label": "Any untested\nopponent d remains?", "shape": "diamond", "note": "Check whether there is still an opponent we have not compared c against in a head-to-head majority vote."}, {"id": "pairwise", "label": "Count voters\npreferring c over d", "shape": "rect", "note": "For each voter, check whether c is ranked above d. Count how many voters prefer c to d and how many prefer d to c."}, {"id": "beats", "label": "Majority prefer\nc over d?", "shape": "diamond", "note": "If more than half the voters prefer c to d, then c wins the pairwise comparison. If not, c fails and cannot be the Condorcet winner."}, {"id": "next", "label": "Mark d as tested,\ncontinue", "shape": "rect", "note": "c has beaten d. Move on to compare c against the next untested opponent."}, {"id": "fail", "label": "c eliminated:\nnext candidate", "shape": "rect", "note": "c has lost to d and cannot be the Condorcet winner. Move to the next untested candidate and start over."}, {"id": "more", "label": "Untested candidates\nremain?", "shape": "diamond", "note": "Check if there are any candidates we have not yet tried as a potential Condorcet winner."}, {"id": "found", "label": "CONDORCET WINNER\nFOUND: c", "shape": "terminal", "variant": "success", "note": "Candidate c has beaten every other candidate in pairwise majority comparisons and is the unique Condorcet winner of this profile."}, {"id": "none", "label": "NO CONDORCET\nWINNER EXISTS", "shape": "terminal", "variant": "failure", "note": "All candidates have been eliminated. There is no Condorcet winner — the profile likely contains a Condorcet cycle (majority preferences cycle: a beats b beats c beats a)."}], "edges": [{"from": "start", "to": "pick"}, {"from": "pick", "to": "others"}, {"from": "others", "to": "pairwise", "label": "Yes"}, {"from": "pairwise", "to": "beats"}, {"from": "beats", "to": "next", "label": "Yes"}, {"from": "beats", "to": "fail", "label": "No"}, {"from": "next", "to": "others"}, {"from": "fail", "to": "more"}, {"from": "others", "to": "found", "label": "No"}, {"from": "more", "to": "pick", "label": "Yes"}, {"from": "more", "to": "none", "label": "No"}]}, {"id": "chart-4", "type": "flowchart", "title": "Voting Rule Classification", "description": "Taxonomy of single-winner voting rules by their type, properties, and Condorcet consistency.", "nodes": [{"id": "root", "label": "Single-Winner\nVoting Rules", "shape": "rect", "note": "Single-winner voting rules take a preference profile and return one or more candidates as winners. They differ in what information they use and what axiomatic properties they satisfy."}, {"id": "psr", "label": "Positional Scoring\nRules (PSR)", "shape": "rect", "note": "Positional scoring rules assign scores to candidates based solely on their position in each voter's ranking. They are defined by a scoring vector s = (s1, ..., sm) with s1 >= ... >= sm and s1 > sm."}, {"id": "elim2", "label": "Elimination-Based\nMethods", "shape": "rect", "note": "Elimination-based methods iteratively remove candidates in rounds until a winner emerges. They use more of the preference information than PSRs but are computationally more complex."}, {"id": "cond", "label": "Condorcet-Consistent\nMethods", "shape": "rect", "note": "Condorcet-consistent methods are defined to elect the Condorcet winner whenever one exists. They use pairwise majority information rather than positional scoring."}, {"id": "plur", "label": "Plurality\n(1,0,...,0)", "shape": "rect", "note": "Plurality gives one point to each voter's top-ranked candidate. It is the simplest PSR but can elect candidates opposed by the majority when there are three or more candidates."}, {"id": "borda2", "label": "Borda Count\n(m-1,...,1,0)", "shape": "rect", "note": "Borda count sums positional scores across all voters. It rewards broadly popular candidates but is susceptible to strategic manipulation by burying opponents."}, {"id": "veto", "label": "Veto\n(1,...,1,0)", "shape": "rect", "note": "Veto scoring gives each candidate one point from every voter except the one who ranked them last. Equivalent to penalising last-place rankings rather than rewarding top ones."}, {"id": "irv2", "label": "IRV / STV", "shape": "rect", "note": "Instant-Runoff Voting repeatedly eliminates the candidate with fewest first-place votes. Used in many real elections but can fail to elect the Condorcet winner."}, {"id": "cop", "label": "Copeland Rule\n(pairwise wins)", "shape": "rect", "note": "Copeland scores candidates by the number of pairwise majority wins. It is Condorcet-consistent and easy to compute but can produce ties."}, {"id": "maximin2", "label": "Maximin Rule\n(best worst-case)", "shape": "rect", "note": "Maximin elects the candidate whose worst pairwise support is highest. It is Condorcet-consistent and avoids candidates who are strongly disliked by some group."}, {"id": "dodg", "label": "Dodgson Rule\n(min swaps)", "shape": "rect", "note": "Dodgson elects the candidate closest to being a Condorcet winner, measured by the minimum number of adjacent ballot swaps needed. Computing this is NP-hard."}], "edges": [{"from": "root", "to": "psr"}, {"from": "root", "to": "elim2"}, {"from": "root", "to": "cond"}, {"from": "psr", "to": "plur"}, {"from": "psr", "to": "borda2"}, {"from": "psr", "to": "veto"}, {"from": "elim2", "to": "irv2"}, {"from": "cond", "to": "cop"}, {"from": "cond", "to": "maximin2"}, {"from": "cond", "to": "dodg"}]}]};

// TEXT MEASUREMENT
// ═════════════════════════════════════════════════════════════════════════════
const _c = document.createElement('canvas').getContext('2d');
function measure(text, fs = 13, fw = '500') {
  _c.font = `${fw} ${fs}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;
  const lines = String(text).split('\n');
  return {
    w: Math.max(...lines.map(l => _c.measureText(l).width)),
    h: lines.length * (fs * 1.45),
    lines,
  };
}

const zoom = d3.zoom()
  .scaleExtent([0.04, 12])
  .on('zoom', ev => root.attr('transform', ev.transform));

svg.call(zoom)
   .on('dblclick.zoom', () => fitAll());

function fitAll() {
  const svgEl = svg.node();
  const W = svgEl.clientWidth  || 900;
  const H = svgEl.clientHeight || 600;
  const bb = root.node().getBBox();
  if (!bb.width || !bb.height) return;
  const scale = Math.min(0.88 * W / bb.width, 0.88 * H / bb.height, 4);
  const tx = W / 2 - (bb.x + bb.width  / 2) * scale;
  const ty = H / 2 - (bb.y + bb.height / 2) * scale;
  svg.transition().duration(380)
     .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

document.getElementById('btn-zi').addEventListener('click', () =>
  svg.transition().duration(220).call(zoom.scaleBy, 1.45));
document.getElementById('btn-zo').addEventListener('click', () =>
  svg.transition().duration(220).call(zoom.scaleBy, 0.69));
document.getElementById('btn-zr').addEventListener('click', fitAll);

// ═════════════════════════════════════════════════════════════════════════════
// INFO PANEL
// ═════════════════════════════════════════════════════════════════════════════
const infoPanel = document.getElementById('info-panel');
const infoLabel = document.getElementById('info-node-label');
const infoBadge = document.getElementById('info-node-badge');
const infoNote  = document.getElementById('info-note-text');
const hintEl    = document.getElementById('hint');

function badgeFor(node, depth) {
  if (depth !== undefined) {
    // Mindmap node
    if (depth === 0) return { text: 'Root',      cls: 'badge-start' };
    if (depth === 1) return { text: 'Main Topic', cls: 'badge-topic' };
    return               { text: 'Sub-topic',   cls: 'badge-subtopic' };
  }
  if (node.shape === 'diamond')                    return { text: 'Decision',    cls: 'badge-decision' };
  if (node.shape === 'terminal' && node.variant === 'success') return { text: 'Success',    cls: 'badge-success'  };
  if (node.shape === 'terminal' && node.variant === 'failure') return { text: 'Failure',    cls: 'badge-failure'  };
  if (node.shape === 'terminal')                   return { text: 'Start / End', cls: 'badge-start'    };
  return                                                   { text: 'Step',       cls: 'badge-step'     };
}

function showInfo(node, depth) {
  const label = (node.label || '').replace(/\n/g, ' ');
  infoLabel.textContent = label;

  const b = badgeFor(node, depth);
  infoBadge.textContent  = b.text;
  infoBadge.className    = 'badge-class ' + b.cls; // reset then set

  if (node.note) {
    infoNote.textContent = node.note;
    infoNote.className   = '';
  } else {
    infoNote.textContent = 'No description available for this node.';
    infoNote.className   = 'empty';
  }

  infoPanel.classList.add('visible');
  hintEl.classList.add('hidden');
}

function hideInfo() {
  infoPanel.classList.remove('visible');
  hintEl.classList.remove('hidden');
}

document.getElementById('info-close').addEventListener('click', hideInfo);
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideInfo(); });

// Click on SVG background closes panel
svg.on('click', (event) => {
  if (event.target === svg.node() || event.target.id === 'root-layer') hideInfo();
});

// SIDEBAR
// ═════════════════════════════════════════════════════════════════════════════
document.getElementById('sb-module').textContent = DATA.module;
document.getElementById('sb-week'  ).textContent = 'Week ' + DATA.week;
document.getElementById('sb-title' ).textContent = DATA.title;
document.getElementById('sb-count' ).textContent =
  DATA.charts.length + ' chart' + (DATA.charts.length !== 1 ? 's' : '');

const ICONS = { mindmap: '🧠', flowchart: '📊', graph: '🔗' };
const listEl = document.getElementById('chart-list');
let firstSel = null;

DATA.charts.forEach((chart, i) => {
  const el = document.createElement('div');
  el.className = 'chart-item';
  el.innerHTML =
    `<span class="ci-icon">${ICONS[chart.type] || '📋'}</span>
     <div>
       <div class="ci-title">${chart.title}</div>
       <div class="ci-type">${chart.type}</div>
     </div>`;
  el.addEventListener('click', () => selectChart(chart, el));
  listEl.appendChild(el);
  if (i === 0) firstSel = { chart, el };
});

// ═════════════════════════════════════════════════════════════════════════════
// SELECTION
// ═════════════════════════════════════════════════════════════════════════════
function selectChart(chart, itemEl) {
  document.querySelectorAll('.chart-item').forEach(e => e.classList.remove('active'));
  itemEl.classList.add('active');
  document.getElementById('chart-title-el').textContent = chart.title;
  document.getElementById('chart-desc-el' ).textContent = chart.description || '';

  root.selectAll('*').remove();

  if (chart.type === 'mindmap') renderMindmap(chart);
  else                          renderFlowchart(chart);
}

// ═════════════════════════════════════════════════════════════════════════════
// MINDMAP  (D3 radial tree)
// ═════════════════════════════════════════════════════════════════════════════
function renderMindmap(chart) {
  const svgW = svg.node().clientWidth  || 900;
  const svgH = svg.node().clientHeight || 600;
  const R    = Math.min(svgW, svgH) * 0.40;

  // Build parent-child map
  const byId  = Object.fromEntries(chart.nodes.map(n => [n.id, { ...n, _children: [] }]));
  const hasParent = new Set(chart.edges.map(e => e.to));
  chart.edges.forEach(e => { if (byId[e.from] && byId[e.to]) byId[e.from]._children.push(byId[e.to]); });
  const rootNode = chart.nodes.find(n => !hasParent.has(n.id)) || chart.nodes[0];

  // D3 hierarchy + radial tree
  const hier = d3.hierarchy(byId[rootNode.id], d => d._children.length ? d._children : null);
  d3.tree()
    .size([2 * Math.PI, R])
    .separation((a, b) => (a.parent === b.parent ? 1.2 : 2.4) / a.depth)
    (hier);

  // ── Defs: drop shadow ──────────────────────────────────────────────────────
  const defs = root.append('defs');
  const filt = defs.append('filter').attr('id', 'mm-shadow').attr('x', '-20%').attr('y', '-20%').attr('width', '140%').attr('height', '140%');
  filt.append('feDropShadow').attr('dx', 0).attr('dy', 2).attr('stdDeviation', 4).attr('flood-color', '#000').attr('flood-opacity', 0.5);

  // ── Group centered ─────────────────────────────────────────────────────────
  const grp = root.append('g').attr('transform', `translate(${svgW / 2},${svgH / 2})`);

  // ── Links ──────────────────────────────────────────────────────────────────
  const linkRadial = d3.linkRadial().angle(d => d.x).radius(d => d.y);

  grp.append('g').selectAll('path')
    .data(hier.links())
    .join('path')
    .attr('d', linkRadial)
    .attr('fill', 'none')
    .attr('stroke', d => C.levels[Math.min(d.target.depth - 1, C.levels.length - 1)])
    .attr('stroke-width', d => Math.max(1, 3 - d.target.depth * 0.8))
    .attr('opacity', 0.4)
    .attr('stroke-linecap', 'round');

  // ── Nodes ──────────────────────────────────────────────────────────────────
  const nodeG = grp.append('g').selectAll('g')
    .data(hier.descendants())
    .join('g')
    .attr('transform', d => {
      const a = d.x - Math.PI / 2;
      return `translate(${d.y * Math.cos(a)},${d.y * Math.sin(a)})`;
    })
    .style('cursor', 'default');

  nodeG.each(function(d) {
    const g      = d3.select(this);
    const depth  = d.depth;
    const label  = d.data.label || '';
    const color  = depth === 0 ? C.levels[0] : C.levels[Math.min(depth - 1, C.levels.length - 1)];
    const fs     = depth === 0 ? 15 : depth === 1 ? 12.5 : 11;
    const fw     = depth <= 1 ? '700' : '500';
    const m      = measure(label, fs, fw);
    const px     = depth === 0 ? 18 : 12;
    const py     = depth === 0 ? 12 : 8;
    const rw     = m.w + px * 2;
    const rh     = m.h + py * 2;

    if (depth === 0) {
      // Root: filled pill with glow
      g.append('rect')
        .attr('x', -rw / 2).attr('y', -rh / 2)
        .attr('width', rw).attr('height', rh)
        .attr('rx', rh / 2)
        .attr('fill', color)
        .attr('filter', 'url(#mm-shadow)');
    } else {
      // Child: bordered pill
      g.append('rect')
        .attr('x', -rw / 2).attr('y', -rh / 2)
        .attr('width', rw).attr('height', rh)
        .attr('rx', Math.min(rh / 2, 10))
        .attr('fill', color + '18')
        .attr('stroke', color)
        .attr('stroke-width', 1.5);
    }

    // Text
    m.lines.forEach((line, i) => {
      const yOff = (i - (m.lines.length - 1) / 2) * (fs * 1.45);
      g.append('text')
        .text(line)
        .attr('y', yOff)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', fs + 'px')
        .attr('font-weight', fw)
        .attr('fill', depth === 0 ? '#fff' : color)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    });

    // Hover + click
    const shapeEl = g.select(depth === 0 ? 'rect' : 'rect');
    g.style('cursor', 'pointer')
     .on('mouseenter', function() {
        shapeEl.transition().duration(120)
          .attr('fill', depth === 0 ? d3.color(color).brighter(0.3) : color + '32');
      })
     .on('mouseleave', function() {
        shapeEl.transition().duration(120)
          .attr('fill', depth === 0 ? color : color + '18');
      })
     .on('click', function(event) {
        event.stopPropagation();
        showInfo(d.data, depth);
      });
  });

  setTimeout(fitAll, 60);
}

// ═════════════════════════════════════════════════════════════════════════════
// FLOWCHART  (Dagre layout + custom D3 SVG)
// ═════════════════════════════════════════════════════════════════════════════
function renderFlowchart(chart) {
  const FS    = 13;
  const PX    = 22;
  const PY    = 13;
  const DPAD  = 1.5; // diamond size multiplier

  // ── Compute node sizes ────────────────────────────────────────────────────
  const info = {};
  chart.nodes.forEach(n => {
    const m  = measure(n.label || '', FS);
    let w    = Math.max(m.w + PX * 2, 90);
    let h    = Math.max(m.h + PY * 2, 38);
    if (n.shape === 'diamond') { w = (w + 20) * DPAD; h = (h + 10) * DPAD; }
    info[n.id] = { ...m, w, h };
  });

  // ── Dagre graph ───────────────────────────────────────────────────────────
  const gd = new dagre.graphlib.Graph({ multigraph: true });
  gd.setGraph({ rankdir: 'TB', nodesep: 55, ranksep: 75, marginx: 50, marginy: 50, edgesep: 20 });
  gd.setDefaultEdgeLabel(() => ({}));

  chart.nodes.forEach(n  => gd.setNode(n.id, { width: info[n.id].w, height: info[n.id].h }));
  chart.edges.forEach((e, i) => gd.setEdge(e.from, e.to, { label: e.label || '' }, 'e' + i));

  dagre.layout(gd);

  // ── Defs ──────────────────────────────────────────────────────────────────
  const defs  = root.append('defs');

  // Arrowhead
  defs.append('marker')
    .attr('id', 'arr').attr('viewBox', '0 -5 10 10')
    .attr('refX', 8).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', C.arrow);

  // Glow filter for highlighted nodes
  const glow = defs.append('filter').attr('id', 'glow').attr('x', '-30%').attr('y', '-30%').attr('width', '160%').attr('height', '160%');
  glow.append('feGaussianBlur').attr('in', 'SourceGraphic').attr('stdDeviation', '3').attr('result', 'blur');
  glow.append('feComposite').attr('in', 'SourceGraphic').attr('in2', 'blur').attr('operator', 'over');

  // ── Edges ─────────────────────────────────────────────────────────────────
  const edgeG = root.append('g').attr('class', 'edges');
  const lineGen = d3.line().curve(d3.curveCatmullRom.alpha(0.5))
    .x(d => d.x).y(d => d.y);

  gd.edges().forEach(e => {
    const ed  = gd.edge(e);
    if (!ed || !ed.points || ed.points.length < 2) return;
    const pts = ed.points;

    edgeG.append('path')
      .attr('d', lineGen(pts))
      .attr('fill', 'none')
      .attr('stroke', C.edge)
      .attr('stroke-width', 1.5)
      .attr('stroke-linecap', 'round')
      .attr('marker-end', 'url(#arr)');

    if (ed.label) {
      const mid = pts[Math.floor(pts.length / 2)];
      edgeG.append('text')
        .text(ed.label)
        .attr('x', mid.x + 6).attr('y', mid.y - 5)
        .attr('font-size', '11px')
        .attr('font-weight', '600')
        .attr('fill', C.edgeLabel)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    }
  });

  // ── Nodes ─────────────────────────────────────────────────────────────────
  const nodeG = root.append('g').attr('class', 'nodes');

  chart.nodes.forEach(n => {
    const pos    = gd.node(n.id);
    if (!pos) return;
    const ninfo  = info[n.id];
    const w      = pos.width;
    const h      = pos.height;
    const cx     = pos.x;
    const cy     = pos.y;

    // Pick colours
    let pal;
    if (n.shape === 'diamond')       pal = C.node.decision;
    else if (n.variant === 'success') pal = C.node.success;
    else if (n.variant === 'failure') pal = C.node.failure;
    else if (n.variant === 'start')   pal = C.node.start;
    else                              pal = C.node.default;

    const g = nodeG.append('g')
      .attr('transform', `translate(${cx - w/2},${cy - h/2})`)
      .style('cursor', 'default');

    // ── Shape ──────────────────────────────────────────────────────────────
    if (n.shape === 'diamond') {
      const hx = w / 2, hy = h / 2;
      g.append('polygon')
        .attr('points', `${hx},1 ${w-1},${hy} ${hx},${h-1} 1,${hy}`)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    } else if (n.shape === 'terminal') {
      g.append('rect')
        .attr('x', 0).attr('y', 0)
        .attr('width', w).attr('height', h)
        .attr('rx', h / 2)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    } else {
      g.append('rect')
        .attr('x', 0).attr('y', 0)
        .attr('width', w).attr('height', h)
        .attr('rx', 8)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    }

    // ── Label ──────────────────────────────────────────────────────────────
    const textG = g.append('g').attr('transform', `translate(${w/2},${h/2})`);
    ninfo.lines.forEach((line, li) => {
      textG.append('text')
        .text(line)
        .attr('y', (li - (ninfo.lines.length - 1) / 2) * (FS * 1.45))
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', FS + 'px')
        .attr('font-weight', n.shape === 'terminal' ? '700' : '500')
        .attr('fill', pal.text)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    });

    // ── Hover glow + click ─────────────────────────────────────────────────
    const shape = g.select(n.shape === 'diamond' ? 'polygon' : 'rect');
    g.style('cursor', 'pointer')
     .on('mouseenter', () => shape.attr('filter', 'url(#glow)').attr('stroke-width', 2.2))
     .on('mouseleave', () => shape.attr('filter', null).attr('stroke-width', 1.5))
     .on('click', function(event) {
        event.stopPropagation();
        showInfo(n);
      });
  });

  setTimeout(fitAll, 60);
}
