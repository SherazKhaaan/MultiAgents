<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MultiAgents — Week 11: Voting Theory (Part II) — Multiwinner Elections</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  display: flex;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
#sidebar {
  width: 268px;
  min-width: 268px;
  background: #161b22;
  border-right: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
.sb-module {
  font-size: 0.67rem;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 700;
  margin-bottom: 4px;
}
.sb-week  { font-size: 0.76rem; color: #8b949e; margin-bottom: 2px; }
.sb-title { font-size: 0.96rem; font-weight: 700; color: #f0f6fc; line-height: 1.35; }
.sb-count {
  display: inline-block;
  background: #21262d;
  color: #8b949e;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 8px;
  border: 1px solid #30363d;
}

#chart-list { padding: 8px 6px; flex: 1; overflow-y: auto; }
#chart-list::-webkit-scrollbar { width: 3px; }
#chart-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

.chart-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background 0.1s;
  color: #8b949e;
  user-select: none;
  border: 1px solid transparent;
}
.chart-item:hover { background: #21262d; color: #c9d1d9; }
.chart-item.active {
  background: #1f3a6e;
  color: #f0f6fc;
  border-color: #388bfd;
}
.chart-item.active .ci-type { color: #79c0ff; opacity: 1; }
.ci-icon  { font-size: 0.95rem; flex-shrink: 0; margin-top: 2px; }
.ci-title { font-size: 0.83rem; font-weight: 600; line-height: 1.3; }
.ci-type  { font-size: 0.66rem; opacity: 0.6; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.07em; }

/* ── Main ────────────────────────────────────────────────────────────────── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#chart-header {
  padding: 13px 22px 11px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
#chart-title-el { font-size: 1rem; font-weight: 700; color: #79c0ff; margin-bottom: 2px; }
#chart-desc-el  { font-size: 0.81rem; color: #8b949e; font-style: italic; }

#diagram-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #0d1117;
  background-image:
    radial-gradient(circle at 1px 1px, #21262d 1px, transparent 0);
  background-size: 24px 24px;
}

#diagram-svg { width: 100%; height: 100%; display: block; cursor: grab; }
#diagram-svg:active { cursor: grabbing; }

/* ── Zoom controls ───────────────────────────────────────────────────────── */
#zoom-controls {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  z-index: 10;
}
.zoom-btn {
  width: 32px;
  height: 32px;
  border: 1px solid #30363d;
  background: #161b22;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  transition: all 0.1s;
  color: #8b949e;
}
.zoom-btn:hover { background: #21262d; color: #79c0ff; border-color: #388bfd; }

/* ── Hint bar ────────────────────────────────────────────────────────────── */
#hint {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7rem;
  color: #484f58;
  pointer-events: none;
  white-space: nowrap;
  transition: opacity 0.2s;
}
#hint.hidden { opacity: 0; }

.state-msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #484f58;
  font-size: 0.9rem;
  text-align: center;
  pointer-events: none;
}
.state-msg.err { color: #f85149; }

/* ── Info panel (slides in from the left of the diagram area) ──────────── */
#info-panel {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  width: 440px;
  max-width: 50vw;
  background: #161b22;
  border-right: 1px solid #30363d;
  z-index: 30;
  transform: translateX(-100%);
  transition: transform 0.26s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  box-shadow: 12px 0 32px rgba(0, 0, 0, 0.45);
}
#info-panel.visible { transform: translateX(0); }

#info-panel-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
  position: relative;
}
#info-panel-header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}
#info-node-badge {
  font-size: 0.68rem;
  font-weight: 700;
  padding: 3px 11px;
  border-radius: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  flex-shrink: 0;
  display: inline-block;
}
#info-node-label {
  font-size: 1.25rem;
  font-weight: 700;
  color: #f0f6fc;
  line-height: 1.35;
  word-break: break-word;
}

.badge-decision { background: #2d2209; color: #e3b341; border: 1px solid #d29922; }
.badge-step     { background: #0d1f38; color: #79c0ff; border: 1px solid #388bfd; }
.badge-start    { background: #0d1f38; color: #79c0ff; border: 1px solid #388bfd; }
.badge-success  { background: #0d1f12; color: #56d364; border: 1px solid #3fb950; }
.badge-failure  { background: #1c0f0e; color: #ff7b72; border: 1px solid #f85149; }
.badge-topic    { background: #1a1036; color: #c084fc; border: 1px solid #a371f7; }
.badge-subtopic { background: #0d2020; color: #2dd4bf; border: 1px solid #14b8a6; }

#info-close {
  width: 30px;
  height: 30px;
  border: 1px solid #30363d;
  background: #0d1117;
  border-radius: 6px;
  cursor: pointer;
  color: #8b949e;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.1s;
}
#info-close:hover { background: #21262d; color: #f0f6fc; border-color: #8b949e; }

#info-panel-body {
  padding: 20px 24px 24px;
  overflow-y: auto;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: #30363d transparent;
}
#info-panel-body::-webkit-scrollbar { width: 6px; }
#info-panel-body::-webkit-scrollbar-track { background: transparent; }
#info-panel-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
#info-panel-body::-webkit-scrollbar-thumb:hover { background: #484f58; }

#info-section-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: #6e7681;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}
#info-note-text {
  font-size: 1rem;
  color: #c9d1d9;
  line-height: 1.75;
}
#info-note-text.empty {
  color: #484f58;
  font-style: italic;
}
</style>

<script>
// ═════════════════════════════════════════════════════════════════════════════
// DATA
// ═════════════════════════════════════════════════════════════════════════════
const DATA = {"module": "MultiAgents", "week": 11, "title": "Voting Theory (Part II) — Multiwinner Elections", "charts": [{"id": "chart-1", "type": "mindmap", "title": "Week 11 Topic Map", "description": "High-level overview of all major topics covered in Week 11: multiwinner elections, committee scoring rules, Thiele methods, and proportional representation.", "nodes": [{"id": "root", "label": "Week 11\nMultiwinner Elections", "note": "Multiwinner elections select a committee of k candidates rather than a single winner. The right rule depends on the goal: excellence (best individuals), diversity (broad coverage), or proportional representation (reflect voter groups)."}, {"id": "types", "label": "Types of\nMultiwinner Rules", "note": "Three distinct goals drive multiwinner rule design: excellence selects the best k individuals independently, diversity ensures different perspectives are represented, and proportional representation reflects voter group sizes in the committee."}, {"id": "stv", "label": "Single Transferable\nVote (STV)", "note": "STV generalises IRV to committee elections using a quota of floor(n/(k+1))+1. Candidates meeting the quota are elected and surplus votes transferred; the weakest candidate is eliminated if no one meets the quota."}, {"id": "csr", "label": "Committee\nScoring Rules", "note": "Committee scoring rules extend positional scoring rules to committees. A scoring function assigns a value to each possible position vector (where committee members appear in the ranking), and the winning committee maximises total score."}, {"id": "thiele", "label": "Thiele Methods\n(Approval-Based)", "note": "Thiele methods work with approval ballots. A weight vector determines the marginal utility of each additional approved committee member: AV uses equal weights (excellence), CC uses (1,0,...) (diversity), PAV uses harmonic weights (proportionality)."}, {"id": "jr", "label": "Justified\nRepresentation", "note": "Justified representation (JR) and its stronger variant EJR guarantee that cohesive voter groups of sufficient size receive proportional representation in the committee. PAV satisfies EJR; CC satisfies JR; AV satisfies neither."}, {"id": "pb", "label": "Participatory\nBudgeting", "note": "Participatory budgeting selects a subset of projects under a cost budget. The greedy method iteratively picks the most-approved affordable project, approximating the solution to a knapsack problem."}, {"id": "sntv", "label": "SNTV", "note": "Single Non-Transferable Vote scores a committee by counting voters whose first choice is in the committee. Only the best-positioned committee member matters for each voter."}, {"id": "bloc", "label": "Bloc", "note": "Bloc scoring counts appearances in each voter's top-k preferences. Each voter effectively casts k votes, and the k most-mentioned candidates win, similar to plurality applied to committees."}, {"id": "kborda", "label": "k-Borda", "note": "k-Borda selects the k candidates with the highest individual Borda scores. It is an excellence-based rule that rewards candidates who are broadly preferred across all voters' rankings."}, {"id": "cc", "label": "Chamberlin-Courant\n(CC)", "note": "Chamberlin-Courant scores a committee by summing each voter's Borda score for their best representative in the committee. It captures diversity by rewarding committees that include at least one candidate each voter likes."}, {"id": "av", "label": "Approval Voting\n(AV)", "note": "Approval Voting selects the k candidates with the most approvals. Each additional approved candidate contributes equally, so it maximises total welfare but ignores diminishing returns and proportionality."}, {"id": "pav", "label": "PAV\n(Harmonic Weights)", "note": "Proportional Approval Voting uses harmonic weights (1, 1/2, 1/3, ...) to give diminishing marginal utility for each additional approved representative. It is the unique Thiele method satisfying EJR."}], "edges": [{"from": "root", "to": "types"}, {"from": "root", "to": "stv"}, {"from": "root", "to": "csr"}, {"from": "root", "to": "thiele"}, {"from": "root", "to": "jr"}, {"from": "root", "to": "pb"}, {"from": "csr", "to": "sntv"}, {"from": "csr", "to": "bloc"}, {"from": "csr", "to": "kborda"}, {"from": "csr", "to": "cc"}, {"from": "thiele", "to": "av"}, {"from": "thiele", "to": "pav"}]}, {"id": "chart-2", "type": "flowchart", "title": "Single Transferable Vote (STV) Algorithm", "description": "Step-by-step procedure for electing a committee of k candidates using the Single Transferable Vote method.", "nodes": [{"id": "start", "label": "Start: n voters,\nm candidates, size k", "shape": "terminal", "variant": "start", "note": "We have n voters with ranked ballots over m candidates and want to elect a committee of k candidates."}, {"id": "quota", "label": "Compute quota\nq = floor(n/(k+1)) + 1", "shape": "rect", "note": "The Droop quota q is the minimum number of first-place votes needed to guarantee election. With k=1, this reduces to a majority quota, making STV equivalent to IRV."}, {"id": "init", "label": "Elected = 0,\nall candidates active", "shape": "rect", "note": "Initialise the set of elected candidates as empty and all candidates as active. Voter ballots will be updated as candidates are elected or eliminated."}, {"id": "enough", "label": "Elected k\ncandidates?", "shape": "diamond", "note": "Check whether we have already selected exactly k candidates. If so, the committee is complete and we are done."}, {"id": "done", "label": "COMMITTEE\nELECTED", "shape": "terminal", "variant": "success", "note": "The elected set contains exactly k candidates, forming the winning committee under STV."}, {"id": "count", "label": "Count first-place\nvotes per candidate", "shape": "rect", "note": "For each active candidate, count how many voters currently have them ranked first on their active ballot."}, {"id": "quota_met", "label": "Any candidate\nreaches quota q?", "shape": "diamond", "note": "Check whether any active candidate has at least q first-place votes. Meeting the quota triggers election and surplus transfer."}, {"id": "elect", "label": "Elect that\ncandidate c", "shape": "rect", "note": "Add c to the elected set. If c has more than q votes (a surplus of votes-q), transfer q of their supporters' ballots to those voters' next-ranked active candidate."}, {"id": "remove", "label": "Remove c from\nactive candidates", "shape": "rect", "note": "Remove the elected candidate c from all remaining active ballots so future rounds only consider unelected candidates."}, {"id": "elim", "label": "Eliminate candidate\nwith fewest votes", "shape": "rect", "note": "No candidate met the quota, so eliminate the active candidate with the fewest first-place votes (use tie-breaking if needed). Their supporters' votes transfer to the next active candidate on those ballots."}], "edges": [{"from": "start", "to": "quota"}, {"from": "quota", "to": "init"}, {"from": "init", "to": "enough"}, {"from": "enough", "to": "done", "label": "Yes"}, {"from": "enough", "to": "count", "label": "No"}, {"from": "count", "to": "quota_met"}, {"from": "quota_met", "to": "elect", "label": "Yes"}, {"from": "quota_met", "to": "elim", "label": "No"}, {"from": "elect", "to": "remove"}, {"from": "remove", "to": "enough"}, {"from": "elim", "to": "enough"}]}, {"id": "chart-3", "type": "flowchart", "title": "Choosing a Thiele Method", "description": "Decision guide for selecting the appropriate Thiele approval-based voting method based on the desired committee goal.", "nodes": [{"id": "start", "label": "Start: approval\nballots, committee size k", "shape": "terminal", "variant": "start", "note": "We have approval ballots from n voters and want to elect a committee of k candidates. The right Thiele method depends on what the committee should optimise."}, {"id": "goal", "label": "What is the\ncommittee goal?", "shape": "diamond", "note": "Three distinct goals lead to different weight vectors. Excellence: select the best-liked individuals. Diversity: ensure broad coverage. Proportional: reflect voter group sizes."}, {"id": "excel", "label": "Excellence goal:\nmaximise total approvals", "shape": "rect", "note": "Use Approval Voting (AV). Each approved committee member contributes equally to total welfare. Weight vector is (1, 1, 1, ...). Maximises the sum of utility across all voters."}, {"id": "div", "label": "Diversity goal:\nmaximise voter coverage", "shape": "rect", "note": "Use Chamberlin-Courant (CC). Only the first approved representative counts for each voter. Weight vector is (1, 0, 0, ...). Maximises the number of voters who have at least one representative."}, {"id": "prop", "label": "Proportional goal:\nreflect group sizes", "shape": "rect", "note": "Use Proportional Approval Voting (PAV). Harmonic weight vector (1, 1/2, 1/3, ...) gives diminishing returns for additional representatives. The unique Thiele method satisfying extended justified representation (EJR)."}, {"id": "av", "label": "USE: Approval\nVoting (AV)", "shape": "terminal", "variant": "success", "note": "AV selects the k candidates with the most total approvals. It is computationally efficient (polynomial) but can systematically exclude minority voter groups."}, {"id": "cc", "label": "USE: Chamberlin-\nCourant (CC)", "shape": "terminal", "variant": "success", "note": "CC maximises the number of voters with at least one approved representative in the committee. Computing the optimal CC committee is NP-hard; greedy approximations are used in practice."}, {"id": "pav", "label": "USE: Proportional\nApproval Voting (PAV)", "shape": "terminal", "variant": "success", "note": "PAV balances excellence and diversity via harmonic diminishing returns. It satisfies EJR, guaranteeing proportional representation for cohesive voter groups. Computing PAV is NP-hard."}], "edges": [{"from": "start", "to": "goal"}, {"from": "goal", "to": "excel", "label": "Excellence"}, {"from": "goal", "to": "div", "label": "Diversity"}, {"from": "goal", "to": "prop", "label": "Proportional"}, {"from": "excel", "to": "av"}, {"from": "div", "to": "cc"}, {"from": "prop", "to": "pav"}]}, {"id": "chart-4", "type": "flowchart", "title": "Checking Justified Representation (JR / EJR)", "description": "Procedure to verify whether a given committee satisfies Justified Representation or Extended Justified Representation for an approval ballot election.", "nodes": [{"id": "start", "label": "Start: committee W,\napproval ballots, k, n", "shape": "terminal", "variant": "start", "note": "We have a candidate committee W, approval ballots from n voters, committee size k, and want to check whether W satisfies JR or EJR."}, {"id": "setell", "label": "Set ell = 1\n(start with JR)", "shape": "rect", "note": "JR corresponds to ell=1. EJR also requires ell=2,3,...,k. We check each level ell in turn."}, {"id": "findgroup", "label": "Find group S with\n|S| >= ell*n/k", "shape": "rect", "note": "Search for a group S of voters with at least ell*n/k members who all share at least ell commonly approved candidates (the intersection of their approval sets has size at least ell)."}, {"id": "exists", "label": "Does such a\ncohesive group exist?", "shape": "diamond", "note": "Check whether any group S of sufficient size exists with at least ell candidates approved by all members. If no such group exists, the condition is vacuously satisfied for this ell."}, {"id": "checkrep", "label": "Does any voter in S\nhave utility >= ell?", "shape": "diamond", "note": "Check whether at least one voter i in S has at least ell approved candidates in committee W (i.e. |A_i intersection W| >= ell). If yes, the group is proportionally represented."}, {"id": "violate", "label": "VIOLATION: JR/EJR\nNOT SATISFIED", "shape": "terminal", "variant": "failure", "note": "A cohesive group of sufficient size exists but no member has enough representatives in W. The committee violates JR (if ell=1) or EJR (if ell>1). The rule that selected W may not satisfy proportional representation."}, {"id": "nextell", "label": "ell = ell + 1", "shape": "rect", "note": "The condition is satisfied for this level ell. Move to the next level to check the stronger EJR condition."}, {"id": "alldone", "label": "Checked all\nell up to k?", "shape": "diamond", "note": "EJR requires checking all levels from ell=1 to ell=k. If all levels pass, the committee satisfies EJR (which implies JR)."}, {"id": "satisfied", "label": "EJR SATISFIED\n(implies JR too)", "shape": "terminal", "variant": "success", "note": "All ell-levels have been checked and no violation was found. The committee W satisfies Extended Justified Representation, guaranteeing proportional representation for all cohesive voter groups."}], "edges": [{"from": "start", "to": "setell"}, {"from": "setell", "to": "findgroup"}, {"from": "findgroup", "to": "exists"}, {"from": "exists", "to": "checkrep", "label": "Yes"}, {"from": "exists", "to": "nextell", "label": "No"}, {"from": "checkrep", "to": "violate", "label": "No"}, {"from": "checkrep", "to": "nextell", "label": "Yes"}, {"from": "nextell", "to": "alldone"}, {"from": "alldone", "to": "findgroup", "label": "No"}, {"from": "alldone", "to": "satisfied", "label": "Yes"}]}]};

// TEXT MEASUREMENT
// ═════════════════════════════════════════════════════════════════════════════
const _c = document.createElement('canvas').getContext('2d');
function measure(text, fs = 13, fw = '500') {
  _c.font = `${fw} ${fs}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;
  const lines = String(text).split('\n');
  return {
    w: Math.max(...lines.map(l => _c.measureText(l).width)),
    h: lines.length * (fs * 1.45),
    lines,
  };
}

// ═════════════════════════════════════════════════════════════════════════════
// SVG + ZOOM
// ═════════════════════════════════════════════════════════════════════════════
const svg   = d3.select('#diagram-svg');
const root  = svg.append('g').attr('id', 'root-layer');

const zoom = d3.zoom()
  .scaleExtent([0.04, 12])
  .on('zoom', ev => root.attr('transform', ev.transform));

svg.call(zoom)
   .on('dblclick.zoom', () => fitAll());

function fitAll() {
  const svgEl = svg.node();
  const W = svgEl.clientWidth  || 900;
  const H = svgEl.clientHeight || 600;
  const bb = root.node().getBBox();
  if (!bb.width || !bb.height) return;
  const scale = Math.min(0.88 * W / bb.width, 0.88 * H / bb.height, 4);
  const tx = W / 2 - (bb.x + bb.width  / 2) * scale;
  const ty = H / 2 - (bb.y + bb.height / 2) * scale;
  svg.transition().duration(380)
     .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

document.getElementById('btn-zi').addEventListener('click', () =>
  svg.transition().duration(220).call(zoom.scaleBy, 1.45));
document.getElementById('btn-zo').addEventListener('click', () =>
  svg.transition().duration(220).call(zoom.scaleBy, 0.69));
document.getElementById('btn-zr').addEventListener('click', fitAll);

// ═════════════════════════════════════════════════════════════════════════════
// INFO PANEL
// ═════════════════════════════════════════════════════════════════════════════
const infoPanel = document.getElementById('info-panel');
const infoLabel = document.getElementById('info-node-label');
const infoBadge = document.getElementById('info-node-badge');
const infoNote  = document.getElementById('info-note-text');
const hintEl    = document.getElementById('hint');

function badgeFor(node, depth) {
  if (depth !== undefined) {
    // Mindmap node
    if (depth === 0) return { text: 'Root',      cls: 'badge-start' };
    if (depth === 1) return { text: 'Main Topic', cls: 'badge-topic' };
    return               { text: 'Sub-topic',   cls: 'badge-subtopic' };
  }
  if (node.shape === 'diamond')                    return { text: 'Decision',    cls: 'badge-decision' };
  if (node.shape === 'terminal' && node.variant === 'success') return { text: 'Success',    cls: 'badge-success'  };
  if (node.shape === 'terminal' && node.variant === 'failure') return { text: 'Failure',    cls: 'badge-failure'  };
  if (node.shape === 'terminal')                   return { text: 'Start / End', cls: 'badge-start'    };
  return                                                   { text: 'Step',       cls: 'badge-step'     };
}

function showInfo(node, depth) {
  const label = (node.label || '').replace(/\n/g, ' ');
  infoLabel.textContent = label;

  const b = badgeFor(node, depth);
  infoBadge.textContent  = b.text;
  infoBadge.className    = 'badge-class ' + b.cls; // reset then set

  if (node.note) {
    infoNote.textContent = node.note;
    infoNote.className   = '';
  } else {
    infoNote.textContent = 'No description available for this node.';
    infoNote.className   = 'empty';
  }

  infoPanel.classList.add('visible');
  hintEl.classList.add('hidden');
}

function hideInfo() {
  infoPanel.classList.remove('visible');
  hintEl.classList.remove('hidden');
}

document.getElementById('info-close').addEventListener('click', hideInfo);
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideInfo(); });

// Click on SVG background closes panel
svg.on('click', (event) => {
  if (event.target === svg.node() || event.target.id === 'root-layer') hideInfo();
});

// ═════════════════════════════════════════════════════════════════════════════
// SIDEBAR
// ═════════════════════════════════════════════════════════════════════════════
document.getElementById('sb-module').textContent = DATA.module;
document.getElementById('sb-week'  ).textContent = 'Week ' + DATA.week;
document.getElementById('sb-title' ).textContent = DATA.title;
document.getElementById('sb-count' ).textContent =
  DATA.charts.length + ' chart' + (DATA.charts.length !== 1 ? 's' : '');

const ICONS = { mindmap: '🧠', flowchart: '📊', graph: '🔗' };
const listEl = document.getElementById('chart-list');
let firstSel = null;

DATA.charts.forEach((chart, i) => {
  const el = document.createElement('div');
  el.className = 'chart-item';
  el.innerHTML =
    `<span class="ci-icon">${ICONS[chart.type] || '📋'}</span>
     <div>
       <div class="ci-title">${chart.title}</div>
       <div class="ci-type">${chart.type}</div>
     </div>`;
  el.addEventListener('click', () => selectChart(chart, el));
  listEl.appendChild(el);
  if (i === 0) firstSel = { chart, el };
});

// ═════════════════════════════════════════════════════════════════════════════
// SELECTION
// ═════════════════════════════════════════════════════════════════════════════
function selectChart(chart, itemEl) {
  document.querySelectorAll('.chart-item').forEach(e => e.classList.remove('active'));
  itemEl.classList.add('active');
  document.getElementById('chart-title-el').textContent = chart.title;
  document.getElementById('chart-desc-el' ).textContent = chart.description || '';

  root.selectAll('*').remove();

  if (chart.type === 'mindmap') renderMindmap(chart);
  else                          renderFlowchart(chart);
}

// ═════════════════════════════════════════════════════════════════════════════
// MINDMAP  (D3 radial tree)
// ═════════════════════════════════════════════════════════════════════════════
function renderMindmap(chart) {
  const svgW = svg.node().clientWidth  || 900;
  const svgH = svg.node().clientHeight || 600;
  const R    = Math.min(svgW, svgH) * 0.40;

  // Build parent-child map
  const byId  = Object.fromEntries(chart.nodes.map(n => [n.id, { ...n, _children: [] }]));
  const hasParent = new Set(chart.edges.map(e => e.to));
  chart.edges.forEach(e => { if (byId[e.from] && byId[e.to]) byId[e.from]._children.push(byId[e.to]); });
  const rootNode = chart.nodes.find(n => !hasParent.has(n.id)) || chart.nodes[0];

  // D3 hierarchy + radial tree
  const hier = d3.hierarchy(byId[rootNode.id], d => d._children.length ? d._children : null);
  d3.tree()
    .size([2 * Math.PI, R])
    .separation((a, b) => (a.parent === b.parent ? 1.2 : 2.4) / a.depth)
    (hier);

  // ── Defs: drop shadow ──────────────────────────────────────────────────────
  const defs = root.append('defs');
  const filt = defs.append('filter').attr('id', 'mm-shadow').attr('x', '-20%').attr('y', '-20%').attr('width', '140%').attr('height', '140%');
  filt.append('feDropShadow').attr('dx', 0).attr('dy', 2).attr('stdDeviation', 4).attr('flood-color', '#000').attr('flood-opacity', 0.5);

  // ── Group centered ─────────────────────────────────────────────────────────
  const grp = root.append('g').attr('transform', `translate(${svgW / 2},${svgH / 2})`);

  // ── Links ──────────────────────────────────────────────────────────────────
  const linkRadial = d3.linkRadial().angle(d => d.x).radius(d => d.y);

  grp.append('g').selectAll('path')
    .data(hier.links())
    .join('path')
    .attr('d', linkRadial)
    .attr('fill', 'none')
    .attr('stroke', d => C.levels[Math.min(d.target.depth - 1, C.levels.length - 1)])
    .attr('stroke-width', d => Math.max(1, 3 - d.target.depth * 0.8))
    .attr('opacity', 0.4)
    .attr('stroke-linecap', 'round');

  // ── Nodes ──────────────────────────────────────────────────────────────────
  const nodeG = grp.append('g').selectAll('g')
    .data(hier.descendants())
    .join('g')
    .attr('transform', d => {
      const a = d.x - Math.PI / 2;
      return `translate(${d.y * Math.cos(a)},${d.y * Math.sin(a)})`;
    })
    .style('cursor', 'default');

  nodeG.each(function(d) {
    const g      = d3.select(this);
    const depth  = d.depth;
    const label  = d.data.label || '';
    const color  = depth === 0 ? C.levels[0] : C.levels[Math.min(depth - 1, C.levels.length - 1)];
    const fs     = depth === 0 ? 15 : depth === 1 ? 12.5 : 11;
    const fw     = depth <= 1 ? '700' : '500';
    const m      = measure(label, fs, fw);
    const px     = depth === 0 ? 18 : 12;
    const py     = depth === 0 ? 12 : 8;
    const rw     = m.w + px * 2;
    const rh     = m.h + py * 2;

    if (depth === 0) {
      // Root: filled pill with glow
      g.append('rect')
        .attr('x', -rw / 2).attr('y', -rh / 2)
        .attr('width', rw).attr('height', rh)
        .attr('rx', rh / 2)
        .attr('fill', color)
        .attr('filter', 'url(#mm-shadow)');
    } else {
      // Child: bordered pill
      g.append('rect')
        .attr('x', -rw / 2).attr('y', -rh / 2)
        .attr('width', rw).attr('height', rh)
        .attr('rx', Math.min(rh / 2, 10))
        .attr('fill', color + '18')
        .attr('stroke', color)
        .attr('stroke-width', 1.5);
    }

    // Text
    m.lines.forEach((line, i) => {
      const yOff = (i - (m.lines.length - 1) / 2) * (fs * 1.45);
      g.append('text')
        .text(line)
        .attr('y', yOff)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', fs + 'px')
        .attr('font-weight', fw)
        .attr('fill', depth === 0 ? '#fff' : color)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    });

    // Hover + click
    const shapeEl = g.select(depth === 0 ? 'rect' : 'rect');
    g.style('cursor', 'pointer')
     .on('mouseenter', function() {
        shapeEl.transition().duration(120)
          .attr('fill', depth === 0 ? d3.color(color).brighter(0.3) : color + '32');
      })
     .on('mouseleave', function() {
        shapeEl.transition().duration(120)
          .attr('fill', depth === 0 ? color : color + '18');
      })
     .on('click', function(event) {
        event.stopPropagation();
        showInfo(d.data, depth);
      });
  });

  setTimeout(fitAll, 60);
}

// ═════════════════════════════════════════════════════════════════════════════
// FLOWCHART  (Dagre layout + custom D3 SVG)
// ═════════════════════════════════════════════════════════════════════════════
function renderFlowchart(chart) {
  const FS    = 13;
  const PX    = 22;
  const PY    = 13;
  const DPAD  = 1.5; // diamond size multiplier

  // ── Compute node sizes ────────────────────────────────────────────────────
  const info = {};
  chart.nodes.forEach(n => {
    const m  = measure(n.label || '', FS);
    let w    = Math.max(m.w + PX * 2, 90);
    let h    = Math.max(m.h + PY * 2, 38);
    if (n.shape === 'diamond') { w = (w + 20) * DPAD; h = (h + 10) * DPAD; }
    info[n.id] = { ...m, w, h };
  });

  // ── Dagre graph ───────────────────────────────────────────────────────────
  const gd = new dagre.graphlib.Graph({ multigraph: true });
  gd.setGraph({ rankdir: 'TB', nodesep: 55, ranksep: 75, marginx: 50, marginy: 50, edgesep: 20 });
  gd.setDefaultEdgeLabel(() => ({}));

  chart.nodes.forEach(n  => gd.setNode(n.id, { width: info[n.id].w, height: info[n.id].h }));
  chart.edges.forEach((e, i) => gd.setEdge(e.from, e.to, { label: e.label || '' }, 'e' + i));

  dagre.layout(gd);

  // ── Defs ──────────────────────────────────────────────────────────────────
  const defs  = root.append('defs');

  // Arrowhead
  defs.append('marker')
    .attr('id', 'arr').attr('viewBox', '0 -5 10 10')
    .attr('refX', 8).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', C.arrow);

  // Glow filter for highlighted nodes
  const glow = defs.append('filter').attr('id', 'glow').attr('x', '-30%').attr('y', '-30%').attr('width', '160%').attr('height', '160%');
  glow.append('feGaussianBlur').attr('in', 'SourceGraphic').attr('stdDeviation', '3').attr('result', 'blur');
  glow.append('feComposite').attr('in', 'SourceGraphic').attr('in2', 'blur').attr('operator', 'over');

  // ── Edges ─────────────────────────────────────────────────────────────────
  const edgeG = root.append('g').attr('class', 'edges');
  const lineGen = d3.line().curve(d3.curveCatmullRom.alpha(0.5))
    .x(d => d.x).y(d => d.y);

  gd.edges().forEach(e => {
    const ed  = gd.edge(e);
    if (!ed || !ed.points || ed.points.length < 2) return;
    const pts = ed.points;

    edgeG.append('path')
      .attr('d', lineGen(pts))
      .attr('fill', 'none')
      .attr('stroke', C.edge)
      .attr('stroke-width', 1.5)
      .attr('stroke-linecap', 'round')
      .attr('marker-end', 'url(#arr)');

    if (ed.label) {
      const mid = pts[Math.floor(pts.length / 2)];
      edgeG.append('text')
        .text(ed.label)
        .attr('x', mid.x + 6).attr('y', mid.y - 5)
        .attr('font-size', '11px')
        .attr('font-weight', '600')
        .attr('fill', C.edgeLabel)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    }
  });

  // ── Nodes ─────────────────────────────────────────────────────────────────
  const nodeG = root.append('g').attr('class', 'nodes');

  chart.nodes.forEach(n => {
    const pos    = gd.node(n.id);
    if (!pos) return;
    const ninfo  = info[n.id];
    const w      = pos.width;
    const h      = pos.height;
    const cx     = pos.x;
    const cy     = pos.y;

    // Pick colours
    let pal;
    if (n.shape === 'diamond')       pal = C.node.decision;
    else if (n.variant === 'success') pal = C.node.success;
    else if (n.variant === 'failure') pal = C.node.failure;
    else if (n.variant === 'start')   pal = C.node.start;
    else                              pal = C.node.default;

    const g = nodeG.append('g')
      .attr('transform', `translate(${cx - w/2},${cy - h/2})`)
      .style('cursor', 'default');

    // ── Shape ──────────────────────────────────────────────────────────────
    if (n.shape === 'diamond') {
      const hx = w / 2, hy = h / 2;
      g.append('polygon')
        .attr('points', `${hx},1 ${w-1},${hy} ${hx},${h-1} 1,${hy}`)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    } else if (n.shape === 'terminal') {
      g.append('rect')
        .attr('x', 0).attr('y', 0)
        .attr('width', w).attr('height', h)
        .attr('rx', h / 2)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    } else {
      g.append('rect')
        .attr('x', 0).attr('y', 0)
        .attr('width', w).attr('height', h)
        .attr('rx', 8)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    }

    // ── Label ──────────────────────────────────────────────────────────────
    const textG = g.append('g').attr('transform', `translate(${w/2},${h/2})`);
    ninfo.lines.forEach((line, li) => {
      textG.append('text')
        .text(line)
        .attr('y', (li - (ninfo.lines.length - 1) / 2) * (FS * 1.45))
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', FS + 'px')
        .attr('font-weight', n.shape === 'terminal' ? '700' : '500')
        .attr('fill', pal.text)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    });

    // ── Hover glow + click ─────────────────────────────────────────────────
    const shape = g.select(n.shape === 'diamond' ? 'polygon' : 'rect');
    g.style('cursor', 'pointer')
     .on('mouseenter', () => shape.attr('filter', 'url(#glow)').attr('stroke-width', 2.2))
     .on('mouseleave', () => shape.attr('filter', null).attr('stroke-width', 1.5))
     .on('click', function(event) {
        event.stopPropagation();
        showInfo(n);
      });
  });

  setTimeout(fitAll, 60);
}
