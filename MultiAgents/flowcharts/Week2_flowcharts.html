<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MultiAgents — Week 2: Congestion Games, Potential Games, and Price of Anarchy</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  display: flex;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
#sidebar {
  width: 268px;
  min-width: 268px;
  background: #161b22;
  border-right: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
.sb-module {
  font-size: 0.67rem;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 700;
  margin-bottom: 4px;
}
.sb-week  { font-size: 0.76rem; color: #8b949e; margin-bottom: 2px; }
.sb-title { font-size: 0.96rem; font-weight: 700; color: #f0f6fc; line-height: 1.35; }
.sb-count {
  display: inline-block;
  background: #21262d;
  color: #8b949e;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 8px;
  border: 1px solid #30363d;
}

#chart-list { padding: 8px 6px; flex: 1; overflow-y: auto; }
#chart-list::-webkit-scrollbar { width: 3px; }
#chart-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

.chart-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background 0.1s;
  color: #8b949e;
  user-select: none;
  border: 1px solid transparent;
}
.chart-item:hover { background: #21262d; color: #c9d1d9; }
.chart-item.active {
  background: #1f3a6e;
  color: #f0f6fc;
  border-color: #388bfd;
}
.chart-item.active .ci-type { color: #79c0ff; opacity: 1; }
.ci-icon  { font-size: 0.95rem; flex-shrink: 0; margin-top: 2px; }
.ci-title { font-size: 0.83rem; font-weight: 600; line-height: 1.3; }
.ci-type  { font-size: 0.66rem; opacity: 0.6; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.07em; }

/* ── Main ────────────────────────────────────────────────────────────────── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#chart-header {
  padding: 13px 22px 11px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
#chart-title-el { font-size: 1rem; font-weight: 700; color: #79c0ff; margin-bottom: 2px; }
#chart-desc-el  { font-size: 0.81rem; color: #8b949e; font-style: italic; }

#diagram-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #0d1117;
  background-image:
    radial-gradient(circle at 1px 1px, #21262d 1px, transparent 0);
  background-size: 24px 24px;
}

#diagram-svg { width: 100%; height: 100%; display: block; cursor: grab; }
#diagram-svg:active { cursor: grabbing; }

/* ── Zoom controls ───────────────────────────────────────────────────────── */
#zoom-controls {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  z-index: 10;
}
.zoom-btn {
  width: 32px;
  height: 32px;
  border: 1px solid #30363d;
  background: #161b22;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  transition: all 0.1s;
  color: #8b949e;
}
.zoom-btn:hover { background: #21262d; color: #79c0ff; border-color: #388bfd; }

/* ── Hint bar ────────────────────────────────────────────────────────────── */
#hint {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7rem;
  color: #484f58;
  pointer-events: none;
  white-space: nowrap;
  transition: opacity 0.2s;
}
#hint.hidden { opacity: 0; }

.state-msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #484f58;
  font-size: 0.9rem;
  text-align: center;
  pointer-events: none;
}
.state-msg.err { color: #f85149; }

/* ── Info panel (slides in from the left of the diagram area) ──────────── */
#info-panel {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  width: 440px;
  max-width: 50vw;
  background: #161b22;
  border-right: 1px solid #30363d;
  z-index: 30;
  transform: translateX(-100%);
  transition: transform 0.26s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  box-shadow: 12px 0 32px rgba(0, 0, 0, 0.45);
}
#info-panel.visible { transform: translateX(0); }

#info-panel-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
  position: relative;
}
#info-panel-header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}
#info-node-badge {
  font-size: 0.68rem;
  font-weight: 700;
  padding: 3px 11px;
  border-radius: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  flex-shrink: 0;
  display: inline-block;
}
#info-node-label {
  font-size: 1.25rem;
  font-weight: 700;
  color: #f0f6fc;
  line-height: 1.35;
  word-break: break-word;
}

.badge-decision { background: #2d2209; color: #e3b341; border: 1px solid #d29922; }
.badge-step     { background: #0d1f38; color: #79c0ff; border: 1px solid #388bfd; }
.badge-start    { background: #0d1f38; color: #79c0ff; border: 1px solid #388bfd; }
.badge-success  { background: #0d1f12; color: #56d364; border: 1px solid #3fb950; }
.badge-failure  { background: #1c0f0e; color: #ff7b72; border: 1px solid #f85149; }
.badge-topic    { background: #1a1036; color: #c084fc; border: 1px solid #a371f7; }
.badge-subtopic { background: #0d2020; color: #2dd4bf; border: 1px solid #14b8a6; }

#info-close {
  width: 30px;
  height: 30px;
  border: 1px solid #30363d;
  background: #0d1117;
  border-radius: 6px;
  cursor: pointer;
  color: #8b949e;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.1s;
}
#info-close:hover { background: #21262d; color: #f0f6fc; border-color: #8b949e; }

#info-panel-body {
  padding: 20px 24px 24px;
  overflow-y: auto;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: #30363d transparent;
}
#info-panel-body::-webkit-scrollbar { width: 6px; }
#info-panel-body::-webkit-scrollbar-track { background: transparent; }
#info-panel-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
#info-panel-body::-webkit-scrollbar-thumb:hover { background: #484f58; }

#info-section-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: #6e7681;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}
#info-note-text {
  font-size: 1rem;
  color: #c9d1d9;
  line-height: 1.75;
}
#info-note-text.empty {
  color: #484f58;
  font-style: italic;
}
</style>
</head>

<div id="sidebar">

    <div class="sb-module" id="sb-module"></div>

    <div class="sb-count"  id="sb-count"></div>

</div>

<div id="main">

    <div id="chart-title-el">Select a chart</div>
    <div id="chart-desc-el"></div>

    <svg id="diagram-svg"></svg>

  </div>
</div>

<script>

const DATA = {"module": "MultiAgents", "week": 2, "title": "Congestion Games, Potential Games, and Price of Anarchy", "charts": [{"id": "chart-1", "type": "mindmap", "title": "Week 2 Topic Map", "description": "High-level overview of all major topics in Week 2.", "nodes": [{"id": "root", "label": "Week 2\nCongestion & Potential Games", "note": "Week 2 extends game theory to large structured games. Congestion games model shared-resource conflicts, potential games guarantee equilibrium existence via a potential function, and Price of Anarchy quantifies the efficiency loss from selfish behaviour."}, {"id": "motiv", "label": "Motivation:\nConcise Games", "note": "Representing a general n-player game with k actions per player requires k^n payoff entries. Congestion games avoid this by defining costs through a small set of resource cost functions, enabling scalable reasoning."}, {"id": "cong", "label": "Congestion\nGames", "note": "A congestion game is defined by players, facilities with congestion-dependent cost functions, and player actions that are subsets of facilities. Each player's cost depends only on how many others use the same resources."}, {"id": "apps", "label": "Applications", "note": "Congestion games model a wide range of real-world systems including traffic routing, communication networks, cloud computing, multi-robot coordination, energy grids, and IoT sensor networks."}, {"id": "braess", "label": "Braess's\nParadox", "note": "Adding a new resource (road) to a network can paradoxically increase the equilibrium travel time for all players. This shows that equilibrium outcomes need not improve when the strategy space expands."}, {"id": "brd", "label": "Best Response\nDynamics", "note": "Best response dynamics is an iterative algorithm where players repeatedly switch to their best response. For congestion games, Rosenthal's theorem guarantees this always terminates at a pure Nash equilibrium."}, {"id": "pot", "label": "Potential\nGames", "note": "A potential game has a single potential function whose changes exactly track the deviating player's cost change. Congestion games are exact potential games, which guarantees the Finite Improvement Property and PSNE existence."}, {"id": "maxcut", "label": "Max-Cut &\nLocal Search", "note": "The maximum cut problem is NP-hard but solvable to a local optimum via simple local search. Computing local optima of max-cut is PLS-complete, connecting to the hardness of finding PSNE in general potential games."}, {"id": "poa", "label": "Price of Anarchy\n& Stability", "note": "The Price of Anarchy (PoA) and Price of Stability (PoS) measure the efficiency gap between the worst (or best) Nash equilibrium and the social optimum. For linear congestion games, PoA is at most 5/2."}, {"id": "formal", "label": "Formal Definition\n& Network Games", "note": "A congestion game is a tuple of players, resources, actions (subsets of resources per player), and cost functions d_j(k) giving the cost of resource j when k players use it."}, {"id": "rosgame", "label": "Rosenthal's\nTheorem", "note": "Rosenthal (1973) proved the Finite Improvement Property for congestion games: every sequence of improvement steps is finite. This directly implies that every congestion game has at least one pure Nash equilibrium."}, {"id": "rospot", "label": "Rosenthal's\nPotential Function", "note": "The potential function Phi(a) sums cumulative resource costs across all resources. When a player deviates, the change in Phi equals the change in that player's cost, making it an exact potential function."}, {"id": "pottype", "label": "Potential\nGame Variants", "note": "There are three notions of potential: exact (delta cost = delta Phi), ordinal (signs match), and generalised ordinal (improvement implies Phi decreases). Generalised ordinal potential is equivalent to the Finite Improvement Property."}, {"id": "identify", "label": "Identifying\nPotential Games", "note": "A game can be tested for the potential property by the guess-and-check method (seed Phi at one profile and derive all others) or by verifying that all unilateral deviation cycles of length 4 sum to zero."}, {"id": "poadef", "label": "PoA & PoS\nDefinitions", "note": "PoA is the ratio of the worst Nash equilibrium cost to the optimal cost. PoS is the ratio of the best Nash equilibrium cost to the optimal. Both are at least 1; PoS is always at most PoA."}, {"id": "linear", "label": "Linear Games\nPoA Bound 5/2", "note": "For congestion games with linear cost functions, the Price of Anarchy is at most 5/2 and this bound is tight. The proof uses the sandwich inequality: half the social cost is at most Phi, which is at most the social cost."}], "edges": [{"from": "root", "to": "motiv"}, {"from": "root", "to": "cong"}, {"from": "root", "to": "apps"}, {"from": "root", "to": "braess"}, {"from": "root", "to": "brd"}, {"from": "root", "to": "pot"}, {"from": "root", "to": "maxcut"}, {"from": "root", "to": "poa"}, {"from": "cong", "to": "formal"}, {"from": "brd", "to": "rosgame"}, {"from": "pot", "to": "rospot"}, {"from": "pot", "to": "pottype"}, {"from": "pot", "to": "identify"}, {"from": "poa", "to": "poadef"}, {"from": "poa", "to": "linear"}]}, {"id": "chart-2", "type": "flowchart", "title": "Best Response Dynamics Algorithm", "description": "Iterative algorithm where players switch to best responses; guaranteed to terminate in congestion games.", "nodes": [{"id": "start", "label": "Start: arbitrary\naction profile a", "shape": "terminal", "variant": "start", "note": "Initialise with any feasible action profile. In a congestion game, every player is assigned some action (subset of resources) to begin."}, {"id": "check", "label": "Any player i not\nplaying best response?", "shape": "diamond", "note": "Check whether any player i can reduce their cost by switching to a different action, given everyone else's current choices. If yes, that player is not at a best response."}, {"id": "pick", "label": "Select such\nplayer i", "shape": "rect", "note": "Choose any player who is not currently at a best response. The order of selection can vary; the algorithm is correct regardless of which player moves next."}, {"id": "update", "label": "Set a_i = best response\nto current a_{-i}", "shape": "rect", "note": "Player i switches to the action that minimises their cost given all other players' current actions. This is a strict improvement in cost for player i."}, {"id": "phi", "label": "Phi strictly\ndecreases", "shape": "rect", "note": "Because the deviation is an improvement and the game is a congestion game, Rosenthal's potential function Phi decreases by the same amount as player i's cost reduction. Since Phi has finitely many values, this ensures termination."}, {"id": "halt", "label": "All players at\nbest response?", "shape": "diamond", "note": "After the update, re-check whether any player still has an improving deviation. If all players are at their best response simultaneously, the current profile is a pure Nash equilibrium."}, {"id": "psne", "label": "PSNE reached\nReturn a", "shape": "terminal", "variant": "success", "note": "The algorithm has terminated at a profile where no player can unilaterally reduce their cost. By definition, this is a pure strategy Nash equilibrium of the congestion game."}], "edges": [{"from": "start", "to": "check"}, {"from": "check", "to": "pick", "label": "Yes"}, {"from": "pick", "to": "update"}, {"from": "update", "to": "phi"}, {"from": "phi", "to": "halt"}, {"from": "halt", "to": "pick", "label": "No"}, {"from": "halt", "to": "psne", "label": "Yes"}, {"from": "check", "to": "psne", "label": "No"}]}, {"id": "chart-3", "type": "flowchart", "title": "Identifying Potential Games", "description": "Two methods to test whether a game is a potential game: guess-and-check and cycle inspection.", "nodes": [{"id": "start", "label": "Start: normal form game", "shape": "terminal", "variant": "start", "note": "We want to determine whether the game has a potential function. We have two approaches: guess-and-check (build Phi explicitly) or cycle inspection (algebraic test on unilateral deviation cycles)."}, {"id": "method", "label": "Choose approach:\nGuess-Check or Cycle?", "shape": "diamond", "note": "The guess-and-check method explicitly constructs the potential function. The cycle method algebraically verifies whether a potential can exist without constructing it. Both are equivalent in power."}, {"id": "seed", "label": "Seed: set Phi at\none profile to 0", "shape": "rect", "note": "Assign Phi an arbitrary value (e.g. 0) at any chosen profile. This is valid because potential functions are unique only up to a constant."}, {"id": "derive", "label": "Derive Phi values\nvia deviation equations", "shape": "rect", "note": "For each unilateral deviation from a known profile, set delta Phi equal to the deviating player's cost change. Propagate these values to all other profiles reachable by single deviations."}, {"id": "consist", "label": "All derived values\nconsistent?", "shape": "diamond", "note": "Check if every profile has a unique, well-defined Phi value regardless of the path of deviations taken to reach it. Inconsistency means different derivation paths give different values for the same profile."}, {"id": "cycles", "label": "Form all unilateral\ndeviation cycles", "shape": "rect", "note": "For a 2-player game, enumerate all cycles of length 4: (a_i, a_j) -> (a'_i, a_j) -> (a'_i, a'_j) -> (a_i, a'_j) -> (a_i, a_j). For each transition, record the deviating player's cost change."}, {"id": "cycsum", "label": "All cycle sums\nequal zero?", "shape": "diamond", "note": "A game is a potential game if and only if the sum of cost changes around every unilateral deviation cycle equals zero. A non-zero cycle sum proves no potential function can exist."}, {"id": "ispot", "label": "Game IS a\npotential game", "shape": "terminal", "variant": "success", "note": "The game has a valid potential function. Best response dynamics will always terminate, and at least one pure Nash equilibrium is guaranteed to exist."}, {"id": "notpot", "label": "Game is NOT a\npotential game", "shape": "terminal", "variant": "failure", "note": "No potential function exists for this game. Best response dynamics may cycle and PSNE existence is not guaranteed by this criterion alone."}], "edges": [{"from": "start", "to": "method"}, {"from": "method", "to": "seed", "label": "Guess-Check"}, {"from": "method", "to": "cycles", "label": "Cycle"}, {"from": "seed", "to": "derive"}, {"from": "derive", "to": "consist"}, {"from": "consist", "to": "ispot", "label": "Yes"}, {"from": "consist", "to": "notpot", "label": "No"}, {"from": "cycles", "to": "cycsum"}, {"from": "cycsum", "to": "ispot", "label": "Yes"}, {"from": "cycsum", "to": "notpot", "label": "No"}]}, {"id": "chart-4", "type": "flowchart", "title": "Computing Price of Anarchy and Price of Stability", "description": "Step-by-step procedure for computing PoA and PoS for a given game.", "nodes": [{"id": "start", "label": "Start: game and\noptimisation goal", "shape": "terminal", "variant": "start", "note": "Specify whether the objective is minimisation (e.g. social cost) or maximisation (e.g. social welfare). The PoA and PoS formulas differ between the two."}, {"id": "opt", "label": "Find optimal\nstrategy profile s*", "shape": "rect", "note": "Compute or enumerate all strategy profiles and find the one with the best social objective (minimum social cost or maximum social welfare). This is the benchmark."}, {"id": "allne", "label": "Find all pure\nNash equilibria", "shape": "rect", "note": "Enumerate or compute all strategy profiles where no player has an incentive to deviate. For congestion and potential games, at least one PSNE is guaranteed by Rosenthal's theorem."}, {"id": "hasne", "label": "Any Nash equilibrium\nfound?", "shape": "diamond", "note": "If no Nash equilibrium exists (possible in general games without mixed strategies), PoA and PoS are undefined. In congestion games, a PSNE always exists."}, {"id": "scne", "label": "Compute social objective\nfor each NE", "shape": "rect", "note": "For each identified Nash equilibrium, calculate the social cost (sum of costs) or social welfare (sum of utilities) to determine how efficient each equilibrium is."}, {"id": "poa", "label": "PoA = worst NE value\ndivided by opt value", "shape": "rect", "note": "For minimisation: PoA is the maximum social cost over all NE divided by the optimal social cost. For maximisation: PoA is the optimal welfare divided by the minimum welfare over all NE. Always at least 1."}, {"id": "pos", "label": "PoS = best NE value\ndivided by opt value", "shape": "rect", "note": "For minimisation: PoS is the minimum social cost over all NE divided by the optimal social cost. PoS measures whether a good equilibrium exists. Always between 1 and PoA."}, {"id": "done", "label": "PoA and PoS computed", "shape": "terminal", "variant": "success", "note": "PoA and PoS quantify equilibrium inefficiency. PoA = 1 means all equilibria are optimal; PoS = 1 means at least one equilibrium is optimal."}, {"id": "undef", "label": "PoA/PoS undefined\nfor this game", "shape": "terminal", "variant": "failure", "note": "Without any Nash equilibrium, the efficiency measures cannot be defined. Consider mixed strategy equilibria or a different solution concept."}], "edges": [{"from": "start", "to": "opt"}, {"from": "opt", "to": "allne"}, {"from": "allne", "to": "hasne"}, {"from": "hasne", "to": "scne", "label": "Yes"}, {"from": "hasne", "to": "undef", "label": "No"}, {"from": "scne", "to": "poa"}, {"from": "poa", "to": "pos"}, {"from": "pos", "to": "done"}]}, {"id": "chart-5", "type": "flowchart", "title": "Potential Game Types Hierarchy", "description": "Classification of potential game variants from strongest to weakest, with their properties.", "nodes": [{"id": "root", "label": "Potential Game\nTypes", "shape": "terminal", "variant": "start", "note": "Potential games are classified by how closely the potential function tracks individual cost changes. Stronger notions give stronger guarantees about convergence and equilibrium."}, {"id": "exact", "label": "Exact Potential Game\ndelta cost = delta Phi", "shape": "rect", "note": "The change in the potential function equals exactly the change in the deviating player's cost for every unilateral deviation. Congestion games are always exact potential games. Implies FIP and PSNE existence."}, {"id": "ord", "label": "Ordinal Potential Game\nsigns of changes match", "shape": "rect", "note": "The sign of the potential change matches the sign of the cost change: a cost improvement implies a Phi decrease and vice versa. Weaker than exact, but still implies FIP and PSNE existence."}, {"id": "genord", "label": "Generalised Ordinal\ncost down implies Phi down", "shape": "rect", "note": "Every cost improvement implies a Phi decrease, but a Phi decrease need not imply a cost improvement. This is the weakest potential notion and is equivalent to the Finite Improvement Property."}, {"id": "fip", "label": "Finite Improvement\nProperty (FIP)", "shape": "rect", "note": "Every sequence of improvement steps is finite. This is equivalent to having a generalised ordinal potential function. FIP directly implies that best response dynamics always terminates."}, {"id": "psne", "label": "PSNE Existence\nguaranteed", "shape": "terminal", "variant": "success", "note": "All games with FIP (and hence all potential games) have at least one pure strategy Nash equilibrium. The terminal state of best response dynamics is always a PSNE."}], "edges": [{"from": "root", "to": "exact"}, {"from": "exact", "to": "ord", "label": "implies"}, {"from": "ord", "to": "genord", "label": "implies"}, {"from": "genord", "to": "fip", "label": "equivalent"}, {"from": "fip", "to": "psne", "label": "implies"}]}, {"id": "chart-6", "type": "flowchart", "title": "Braess's Paradox: Adding a Road Hurts", "description": "How adding a zero-cost shortcut between two roads can increase equilibrium travel time for all players.", "nodes": [{"id": "start", "label": "Start: network with\ntwo parallel routes", "shape": "terminal", "variant": "start", "note": "200 travelers go from A to D. Route 1: A to B (cost K/10) then B to D (cost 20). Route 2: A to C (cost 20) then C to D (cost K/10). K is the number of users on that edge."}, {"id": "ne1", "label": "Find NE without\nshortcut B-C", "shape": "rect", "note": "With only two routes and no shortcut, the unique Nash equilibrium has 100 travelers on each route. Each traveler's time is 100/10 + 20 = 30 minutes."}, {"id": "addroad", "label": "Add free shortcut\nB to C (cost 0)", "shape": "rect", "note": "Introduce a zero-cost road directly from B to C. This creates a new strategy: travel A to B to C to D, using only the two congestion-dependent edges."}, {"id": "deviate", "label": "Does any traveler\nbenefit by deviating?", "shape": "diamond", "note": "With 100 on each original route, a traveler switching to A-B-C-D would pay 101/10 + 0 + 100/10 = 20.1 minutes, which is less than 30. So yes, deviation is profitable."}, {"id": "cascade", "label": "All travelers shift\nto A-B-C-D route", "shape": "rect", "note": "Each traveler individually finds A-B-C-D attractive, causing a cascade of switches. At the new equilibrium, all 200 take A-B-C-D."}, {"id": "newne", "label": "New NE: all 200\non A-B-C-D route", "shape": "rect", "note": "All 200 travelers use A to B to C to D. The cost is 200/10 + 0 + 200/10 = 40 minutes each. No traveler can improve by switching: all alternatives also cost 40 minutes."}, {"id": "paradox", "label": "Travel time INCREASED\n30 min to 40 min", "shape": "terminal", "variant": "failure", "note": "The free shortcut worsened the equilibrium for everyone: travel time rose from 30 to 40 minutes. This illustrates that selfish routing at equilibrium can be made worse by expanding the strategy space."}, {"id": "stable", "label": "Original NE is stable\n30 min per traveler", "shape": "terminal", // TEXT MEASUREMENT
// ═════════════════════════════════════════════════════════════════════════════
const _c = document.createElement('canvas').getContext('2d');
function measure(text, fs = 13, fw = '500') {
  _c.font = `${fw} ${fs}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;
  const lines = String(text).split('\n');
  return {
    w: Math.max(...lines.map(l => _c.measureText(l).width)),
    h: lines.length * (fs * 1.45),
    lines,
  };
}

// SVG + ZOOM
// ═════════════════════════════════════════════════════════════════════════════
const svg   = d3.select('#diagram-svg');
const root  = svg.append('g').attr('id', 'root-layer');

const zoom = d3.zoom()
  .scaleExtent([0.04, 12])
  .on('zoom', ev => root.attr('transform', ev.transform));

svg.call(zoom)
   .on('dblclick.zoom', () => fitAll());

function fitAll() {
  const svgEl = svg.node();
  const W = svgEl.clientWidth  || 900;
  const H = svgEl.clientHeight || 600;
  const bb = root.node().getBBox();
  if (!bb.width || !bb.height) return;
  const scale = Math.min(0.88 * W / bb.width, 0.88 * H / bb.height, 4);
  const tx = W / 2 - (bb.x + bb.width  / 2) * scale;
  const ty = H / 2 - (bb.y + bb.height / 2) * scale;
  svg.transition().duration(380)
     .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

document.getElementById('btn-zi').addEventListener('click', () =>
  svg.transition().duration(220).call(zoom.scaleBy, 1.45));
document.getElementById('btn-zo').addEventListener('click', () =>
  svg.transition().duration(220).call(zoom.scaleBy, 0.69));
document.getElementById('btn-zr').addEventListener('click', fitAll);

// INFO PANEL
// ═════════════════════════════════════════════════════════════════════════════
const infoPanel = document.getElementById('info-panel');
const infoLabel = document.getElementById('info-node-label');
const infoBadge = document.getElementById('info-node-badge');
const infoNote  = document.getElementById('info-note-text');
const hintEl    = document.getElementById('hint');

function badgeFor(node, depth) {
  if (depth !== undefined) {
    // Mindmap node
    if (depth === 0) return { text: 'Root',      cls: 'badge-start' };
    if (depth === 1) return { text: 'Main Topic', cls: 'badge-topic' };
    return               { text: 'Sub-topic',   cls: 'badge-subtopic' };
  }
  if (node.shape === 'diamond')                    return { text: 'Decision',    cls: 'badge-decision' };
  if (node.shape === 'terminal' && node.variant === 'success') return { text: 'Success',    cls: 'badge-success'  };
  if (node.shape === 'terminal' && node.variant === 'failure') return { text: 'Failure',    cls: 'badge-failure'  };
  if (node.shape === 'terminal')                   return { text: 'Start / End', cls: 'badge-start'    };
  return                                                   { text: 'Step',       cls: 'badge-step'     };
}

function showInfo(node, depth) {
  const label = (node.label || '').replace(/\n/g, ' ');
  infoLabel.textContent = label;

  const b = badgeFor(node, depth);
  infoBadge.textContent  = b.text;
  infoBadge.className    = 'badge-class ' + b.cls; // reset then set

  if (node.note) {
    infoNote.textContent = node.note;
    infoNote.className   = '';
  } else {
    infoNote.textContent = 'No description available for this node.';
    infoNote.className   = 'empty';
  }

  infoPanel.classList.add('visible');
  hintEl.classList.add('hidden');
}

function hideInfo() {
  infoPanel.classList.remove('visible');
  hintEl.classList.remove('hidden');
}

document.getElementById('info-close').addEventListener('click', hideInfo);
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideInfo(); });

// Click on SVG background closes panel
svg.on('click', (event) => {
  if (event.target === svg.node() || event.target.id === 'root-layer') hideInfo();
});

function selectChart(chart, itemEl) {
  document.querySelectorAll('.chart-item').forEach(e => e.classList.remove('active'));
  itemEl.classList.add('active');
  document.getElementById('chart-title-el').textContent = chart.title;
  document.getElementById('chart-desc-el' ).textContent = chart.description || '';

  if (chart.type === 'mindmap') renderMindmap(chart);
  else                          renderFlowchart(chart);

// ═════════════════════════════════════════════════════════════════════════════
// MINDMAP  (D3 radial tree)
// ═════════════════════════════════════════════════════════════════════════════
function renderMindmap(chart) {
  const svgW = svg.node().clientWidth  || 900;
  const svgH = svg.node().clientHeight || 600;
  const R    = Math.min(svgW, svgH) * 0.40;

  // Build parent-child map
  const byId  = Object.fromEntries(chart.nodes.map(n => [n.id, { ...n, _children: [] }]));
  const hasParent = new Set(chart.edges.map(e => e.to));
  chart.edges.forEach(e => { if (byId[e.from] && byId[e.to]) byId[e.from]._children.push(byId[e.to]); });
  const rootNode = chart.nodes.find(n => !hasParent.has(n.id)) || chart.nodes[0];

  // D3 hierarchy + radial tree
  const hier = d3.hierarchy(byId[rootNode.id], d => d._children.length ? d._children : null);
  d3.tree()
    .size([2 * Math.PI, R])
    .separation((a, b) => (a.parent === b.parent ? 1.2 : 2.4) / a.depth)
    (hier);

  // ── Defs: drop shadow ──────────────────────────────────────────────────────
  const defs = root.append('defs');
  const filt = defs.append('filter').attr('id', 'mm-shadow').attr('x', '-20%').attr('y', '-20%').attr('width', '140%').attr('height', '140%');
  filt.append('feDropShadow').attr('dx', 0).attr('dy', 2).attr('stdDeviation', 4).attr('flood-color', '#000').attr('flood-opacity', 0.5);

  // ── Group centered ─────────────────────────────────────────────────────────
  const grp = root.append('g').attr('transform', `translate(${svgW / 2},${svgH / 2})`);

  // ── Links ──────────────────────────────────────────────────────────────────
  const linkRadial = d3.linkRadial().angle(d => d.x).radius(d => d.y);

  grp.append('g').selectAll('path')
    .data(hier.links())
    .join('path')
    .attr('d', linkRadial)
    .attr('fill', 'none')
    .attr('stroke', d => C.levels[Math.min(d.target.depth - 1, C.levels.length - 1)])
    .attr('stroke-width', d => Math.max(1, 3 - d.target.depth * 0.8))
    .attr('opacity', 0.4)
    .attr('stroke-linecap', 'round');

  // ── Nodes ──────────────────────────────────────────────────────────────────
  const nodeG = grp.append('g').selectAll('g')
    .data(hier.descendants())
    .join('g')
    .attr('transform', d => {
      const a = d.x - Math.PI / 2;
      return `translate(${d.y * Math.cos(a)},${d.y * Math.sin(a)})`;
    })
    .style('cursor', 'default');

  nodeG.each(function(d) {
    const g      = d3.select(this);
    const depth  = d.depth;
    const label  = d.data.label || '';
    const color  = depth === 0 ? C.levels[0] : C.levels[Math.min(depth - 1, C.levels.length - 1)];
    const fs     = depth === 0 ? 15 : depth === 1 ? 12.5 : 11;
    const fw     = depth <= 1 ? '700' : '500';
    const m      = measure(label, fs, fw);
    const px     = depth === 0 ? 18 : 12;
    const py     = depth === 0 ? 12 : 8;
    const rw     = m.w + px * 2;
    const rh     = m.h + py * 2;

    if (depth === 0) {
      // Root: filled pill with glow
      g.append('rect')
        .attr('x', -rw / 2).attr('y', -rh / 2)
        .attr('width', rw).attr('height', rh)
        .attr('rx', rh / 2)
        .attr('fill', color)
        .attr('filter', 'url(#mm-shadow)');
    } else {
      // Child: bordered pill
      g.append('rect')
        .attr('x', -rw / 2).attr('y', -rh / 2)
        .attr('width', rw).attr('height', rh)
        .attr('rx', Math.min(rh / 2, 10))
        .attr('fill', color + '18')
        .attr('stroke', color)
        .attr('stroke-width', 1.5);
    }

    // Text
    m.lines.forEach((line, i) => {
      const yOff = (i - (m.lines.length - 1) / 2) * (fs * 1.45);
      g.append('text')
        .text(line)
        .attr('y', yOff)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', fs + 'px')
        .attr('font-weight', fw)
        .attr('fill', depth === 0 ? '#fff' : color)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    });

    // Hover + click
    const shapeEl = g.select(depth === 0 ? 'rect' : 'rect');
    g.style('cursor', 'pointer')
     .on('mouseenter', function() {
        shapeEl.transition().duration(120)
          .attr('fill', depth === 0 ? d3.color(color).brighter(0.3) : color + '32');
      })
     .on('mouseleave', function() {
        shapeEl.transition().duration(120)
          .attr('fill', depth === 0 ? color : color + '18');
      })
     .on('click', function(event) {
        event.stopPropagation();
        showInfo(d.data, depth);
      });
  });

  setTimeout(fitAll, 60);
}

// ═════════════════════════════════════════════════════════════════════════════
// FLOWCHART  (Dagre layout + custom D3 SVG)
// ═════════════════════════════════════════════════════════════════════════════
function renderFlowchart(chart) {
  const FS    = 13;
  const PX    = 22;
  const PY    = 13;
  const DPAD  = 1.5; // diamond size multiplier

  // ── Compute node sizes ────────────────────────────────────────────────────
  const info = {};
  chart.nodes.forEach(n => {
    const m  = measure(n.label || '', FS);
    let w    = Math.max(m.w + PX * 2, 90);
    let h    = Math.max(m.h + PY * 2, 38);
    if (n.shape === 'diamond') { w = (w + 20) * DPAD; h = (h + 10) * DPAD; }
    info[n.id] = { ...m, w, h };
  });

  // ── Dagre graph ───────────────────────────────────────────────────────────
  const gd = new dagre.graphlib.Graph({ multigraph: true });
  gd.setGraph({ rankdir: 'TB', nodesep: 55, ranksep: 75, marginx: 50, marginy: 50, edgesep: 20 });
  gd.setDefaultEdgeLabel(() => ({}));

  chart.nodes.forEach(n  => gd.setNode(n.id, { width: info[n.id].w, height: info[n.id].h }));
  chart.edges.forEach((e, i) => gd.setEdge(e.from, e.to, { label: e.label || '' }, 'e' + i));

  dagre.layout(gd);

  // ── Defs ──────────────────────────────────────────────────────────────────
  const defs  = root.append('defs');

  // Arrowhead
  defs.append('marker')
    .attr('id', 'arr').attr('viewBox', '0 -5 10 10')
    .attr('refX', 8).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', C.arrow);

  // Glow filter for highlighted nodes
  const glow = defs.append('filter').attr('id', 'glow').attr('x', '-30%').attr('y', '-30%').attr('width', '160%').attr('height', '160%');
  glow.append('feGaussianBlur').attr('in', 'SourceGraphic').attr('stdDeviation', '3').attr('result', 'blur');
  glow.append('feComposite').attr('in', 'SourceGraphic').attr('in2', 'blur').attr('operator', 'over');

  // ── Edges ─────────────────────────────────────────────────────────────────
  const edgeG = root.append('g').attr('class', 'edges');
  const lineGen = d3.line().curve(d3.curveCatmullRom.alpha(0.5))
    .x(d => d.x).y(d => d.y);

  gd.edges().forEach(e => {
    const ed  = gd.edge(e);
    if (!ed || !ed.points || ed.points.length < 2) return;
    const pts = ed.points;

    edgeG.append('path')
      .attr('d', lineGen(pts))
      .attr('fill', 'none')
      .attr('stroke', C.edge)
      .attr('stroke-width', 1.5)
      .attr('stroke-linecap', 'round')
      .attr('marker-end', 'url(#arr)');

    if (ed.label) {
      const mid = pts[Math.floor(pts.length / 2)];
      edgeG.append('text')
        .text(ed.label)
        .attr('x', mid.x + 6).attr('y', mid.y - 5)
        .attr('font-size', '11px')
        .attr('font-weight', '600')
        .attr('fill', C.edgeLabel)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    }
  });

  // ── Nodes ─────────────────────────────────────────────────────────────────
  const nodeG = root.append('g').attr('class', 'nodes');

  chart.nodes.forEach(n => {
    const pos    = gd.node(n.id);
    if (!pos) return;
    const ninfo  = info[n.id];
    const w      = pos.width;
    const h      = pos.height;
    const cx     = pos.x;
    const cy     = pos.y;

    // Pick colours
    let pal;
    if (n.shape === 'diamond')       pal = C.node.decision;
    else if (n.variant === 'success') pal = C.node.success;
    else if (n.variant === 'failure') pal = C.node.failure;
    else if (n.variant === 'start')   pal = C.node.start;
    else                              pal = C.node.default;

    const g = nodeG.append('g')
      .attr('transform', `translate(${cx - w/2},${cy - h/2})`)
      .style('cursor', 'default');

    // ── Shape ──────────────────────────────────────────────────────────────
    if (n.shape === 'diamond') {
      const hx = w / 2, hy = h / 2;
      g.append('polygon')
        .attr('points', `${hx},1 ${w-1},${hy} ${hx},${h-1} 1,${hy}`)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    } else if (n.shape === 'terminal') {
      g.append('rect')
        .attr('x', 0).attr('y', 0)
        .attr('width', w).attr('height', h)
        .attr('rx', h / 2)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    } else {
      g.append('rect')
        .attr('x', 0).attr('y', 0)
        .attr('width', w).attr('height', h)
        .attr('rx', 8)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    }

    // ── Label ──────────────────────────────────────────────────────────────
    const textG = g.append('g').attr('transform', `translate(${w/2},${h/2})`);
    ninfo.lines.forEach((line, li) => {
      textG.append('text')
        .text(line)
        .attr('y', (li - (ninfo.lines.length - 1) / 2) * (FS * 1.45))
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', FS + 'px')
        .attr('font-weight', n.shape === 'terminal' ? '700' : '500')
        .attr('fill', pal.text)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    });

    // ── Hover glow + click ─────────────────────────────────────────────────
    const shape = g.select(n.shape === 'diamond' ? 'polygon' : 'rect');
    g.style('cursor', 'pointer')
     .on('mouseenter', () => shape.attr('filter', 'url(#glow)').attr('stroke-width', 2.2))
     .on('mouseleave', () => shape.attr('filter', null).attr('stroke-width', 1.5))
     .on('click', function(event) {
        event.stopPropagation();
        showInfo(n);
      });
  });

  setTimeout(fitAll, 60);
}
