<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MultiAgents — Week 3: Repeated and Extensive-Form Games</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  display: flex;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
#sidebar {
  width: 268px;
  min-width: 268px;
  background: #161b22;
  border-right: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
.sb-module {
  font-size: 0.67rem;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 700;
  margin-bottom: 4px;
}
.sb-week  { font-size: 0.76rem; color: #8b949e; margin-bottom: 2px; }
.sb-title { font-size: 0.96rem; font-weight: 700; color: #f0f6fc; line-height: 1.35; }
.sb-count {
  display: inline-block;
  background: #21262d;
  color: #8b949e;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 8px;
  border: 1px solid #30363d;
}

#chart-list { padding: 8px 6px; flex: 1; overflow-y: auto; }
#chart-list::-webkit-scrollbar { width: 3px; }
#chart-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

.chart-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background 0.1s;
  color: #8b949e;
  user-select: none;
  border: 1px solid transparent;
}
.chart-item:hover { background: #21262d; color: #c9d1d9; }
.chart-item.active {
  background: #1f3a6e;
  color: #f0f6fc;
  border-color: #388bfd;
}
.chart-item.active .ci-type { color: #79c0ff; opacity: 1; }
.ci-icon  { font-size: 0.95rem; flex-shrink: 0; margin-top: 2px; }
.ci-title { font-size: 0.83rem; font-weight: 600; line-height: 1.3; }
.ci-type  { font-size: 0.66rem; opacity: 0.6; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.07em; }

/* ── Main ────────────────────────────────────────────────────────────────── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#chart-header {
  padding: 13px 22px 11px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
#chart-title-el { font-size: 1rem; font-weight: 700; color: #79c0ff; margin-bottom: 2px; }
#chart-desc-el  { font-size: 0.81rem; color: #8b949e; font-style: italic; }

#diagram-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #0d1117;
  background-image:
    radial-gradient(circle at 1px 1px, #21262d 1px, transparent 0);
  background-size: 24px 24px;
}

#diagram-svg { width: 100%; height: 100%; display: block; cursor: grab; }
#diagram-svg:active { cursor: grabbing; }

/* ── Zoom controls ───────────────────────────────────────────────────────── */
#zoom-controls {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  z-index: 10;
}
.zoom-btn {
  width: 32px;
  height: 32px;
  border: 1px solid #30363d;
  background: #161b22;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  transition: all 0.1s;
  color: #8b949e;
}
.zoom-btn:hover { background: #21262d; color: #79c0ff; border-color: #388bfd; }

/* ── Hint bar ────────────────────────────────────────────────────────────── */
#hint {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7rem;
  color: #484f58;
  pointer-events: none;
  white-space: nowrap;
  transition: opacity 0.2s;
}
#hint.hidden { opacity: 0; }

.state-msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #484f58;
  font-size: 0.9rem;
  text-align: center;
  pointer-events: none;
}
.state-msg.err { color: #f85149; }

/* ── Info panel (slides in from the left of the diagram area) ──────────── */
#info-panel {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  width: 440px;
  max-width: 50vw;
  background: #161b22;
  border-right: 1px solid #30363d;
  z-index: 30;
  transform: translateX(-100%);
  transition: transform 0.26s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  box-shadow: 12px 0 32px rgba(0, 0, 0, 0.45);
}
#info-panel.visible { transform: translateX(0); }

#info-panel-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
  position: relative;
}
#info-panel-header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}
#info-node-badge {
  font-size: 0.68rem;
  font-weight: 700;
  padding: 3px 11px;
  border-radius: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  flex-shrink: 0;
  display: inline-block;
}
#info-node-label {
  font-size: 1.25rem;
  font-weight: 700;
  color: #f0f6fc;
  line-height: 1.35;
  word-break: break-word;
}

.badge-decision { background: #2d2209; color: #e3b341; border: 1px solid #d29922; }
.badge-step     { background: #0d1f38; color: #79c0ff; border: 1px solid #388bfd; }
.badge-start    { background: #0d1f38; color: #79c0ff; border: 1px solid #388bfd; }
.badge-success  { background: #0d1f12; color: #56d364; border: 1px solid #3fb950; }
.badge-failure  { background: #1c0f0e; color: #ff7b72; border: 1px solid #f85149; }
.badge-topic    { background: #1a1036; color: #c084fc; border: 1px solid #a371f7; }
.badge-subtopic { background: #0d2020; color: #2dd4bf; border: 1px solid #14b8a6; }

#info-close {
  width: 30px;
  height: 30px;
  border: 1px solid #30363d;
  background: #0d1117;
  border-radius: 6px;
  cursor: pointer;
  color: #8b949e;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.1s;
}
#info-close:hover { background: #21262d; color: #f0f6fc; border-color: #8b949e; }

#info-panel-body {
  padding: 20px 24px 24px;
  overflow-y: auto;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: #30363d transparent;
}
#info-panel-body::-webkit-scrollbar { width: 6px; }
#info-panel-body::-webkit-scrollbar-track { background: transparent; }
#info-panel-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
#info-panel-body::-webkit-scrollbar-thumb:hover { background: #484f58; }

#info-section-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: #6e7681;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}
#info-note-text {
  font-size: 1rem;
  color: #c9d1d9;
  line-height: 1.75;
}
#info-note-text.empty {
  color: #484f58;
  font-style: italic;
}
</style>

<script>
// ═════════════════════════════════════════════════════════════════════════════
// DATA
// ═════════════════════════════════════════════════════════════════════════════
const DATA = {"module": "MultiAgents", "week": 3, "title": "Repeated and Extensive-Form Games", "charts": [{"id": "chart-1", "type": "mindmap", "title": "Week 3 Topic Map", "description": "High-level overview of all major topics in Week 3.", "nodes": [{"id": "root", "label": "Week 3\nExtensive & Repeated Games", "note": "Week 3 moves beyond simultaneous normal form games to sequential games (extensive form) and repeated interaction. Key new concepts are subgame-perfect equilibrium (ruling out non-credible threats) and the Folk Theorem intuition for repeated games."}, {"id": "efapps", "label": "Extensive Form\nApplications", "note": "Extensive form games model sequential, tree-structured interactions. They underpin AI game-tree search (minimax, alpha-beta), automated negotiation, reinforcement learning, and sequential auctions."}, {"id": "perfinfo", "label": "Perfect Information\nGames", "note": "In perfect information games, every player knows the full history of moves when making a decision. The game is represented as a tree with nodes, edges, and terminal payoffs."}, {"id": "normalvs", "label": "Extensive vs\nNormal Form", "note": "Any perfect-information extensive form game has an equivalent normal form (induced by enumerating pure strategies), but the normal form can be exponentially larger. Simultaneous games like Prisoner's Dilemma cannot be represented in perfect-information extensive form."}, {"id": "spe", "label": "Subgame-Perfect\nEquilibrium", "note": "SPE refines Nash equilibrium by requiring rational play in every subgame, not just on the equilibrium path. It rules out non-credible threats: a threat is non-credible if the threatening player would not actually carry it out when the time came."}, {"id": "repgames", "label": "Repeated\nGames", "note": "Repeated games model long-term interaction where the same stage game is played multiple times. Strategies can now depend on history, enabling cooperation to be sustained through reward-punishment schemes."}, {"id": "imperf", "label": "Imperfect Information\nGames", "note": "Imperfect information games allow players to be uncertain about which node they are at, captured by information sets. Any normal form game can be represented this way, and simultaneous games require it."}, {"id": "infrepeat", "label": "Infinitely Repeated\nGames", "note": "When a game is repeated infinitely (or with unknown end), backward induction no longer forces defection. Strategies like Tit-for-Tat and Grim Trigger can sustain cooperation as a Nash equilibrium when the discount factor is sufficiently large."}, {"id": "formaldef", "label": "Formal Definition\n& Strategies", "note": "An extensive form game is a tuple (N, A, H, Z, chi, rho, sigma, u). A pure strategy specifies an action at every node belonging to a player, even unreachable ones."}, {"id": "backinduct", "label": "Backward\nInduction", "note": "Backward induction solves extensive form games by working from leaves to the root, choosing the optimal action at each node given downstream play. It runs in linear time in the tree size and always finds an SPE."}, {"id": "noncred", "label": "Non-Credible\nThreats", "note": "A Nash equilibrium can involve a player threatening an off-path action they would never rationally take. SPE eliminates these by requiring optimality in every subgame."}, {"id": "infosets", "label": "Information\nSets", "note": "An information set groups nodes a player cannot distinguish. Strategies in imperfect information games specify one action per information set, not per node."}, {"id": "tft", "label": "Tit-for-Tat &\nTrigger Strategy", "note": "Tit-for-Tat mirrors the opponent's last move. Grim Trigger cooperates until the opponent defects, then defects forever. Both can sustain cooperation in infinitely repeated Prisoner's Dilemma for sufficiently high discount factors."}, {"id": "discounting", "label": "Discount Factor\n& Payoffs", "note": "In infinitely repeated games, payoffs are summed with a discount factor beta (0 to 1). Beta captures both time preference and the probability the game continues. Higher beta makes future payoffs matter more, supporting cooperation."}], "edges": [{"from": "root", "to": "efapps"}, {"from": "root", "to": "perfinfo"}, {"from": "root", "to": "normalvs"}, {"from": "root", "to": "spe"}, {"from": "root", "to": "repgames"}, {"from": "root", "to": "imperf"}, {"from": "root", "to": "infrepeat"}, {"from": "perfinfo", "to": "formaldef"}, {"from": "spe", "to": "backinduct"}, {"from": "spe", "to": "noncred"}, {"from": "imperf", "to": "infosets"}, {"from": "infrepeat", "to": "tft"}, {"from": "infrepeat", "to": "discounting"}]}, {"id": "chart-2", "type": "flowchart", "title": "Backward Induction: Computing SPE", "description": "Algorithm for finding subgame-perfect equilibria by working backwards from terminal nodes.", "nodes": [{"id": "start", "label": "Start: perfect-info\nextensive form game", "shape": "terminal", "variant": "start", "note": "We have a finite game tree with terminal payoffs. We want to find all subgame-perfect equilibria using backward induction."}, {"id": "leaves", "label": "Identify all\nterminal nodes (leaves)", "shape": "rect", "note": "Locate all leaf nodes of the game tree. These have known payoff vectors and require no decisions."}, {"id": "parent", "label": "Find deepest\nunresolved choice node", "shape": "rect", "note": "Select the lowest-level non-terminal node (closest to the leaves) whose children are all terminal or already resolved."}, {"id": "whose", "label": "Determine which\nplayer chooses here", "shape": "rect", "note": "Identify the player who moves at this node using the player function rho. This determines whose utility we maximise."}, {"id": "bestact", "label": "Select action\nmaximising player's payoff", "shape": "rect", "note": "Among all actions available at this node, choose the one leading to the subtree with the highest payoff for the player who moves here. Record this as that player's SPE strategy at this node."}, {"id": "resolve", "label": "Replace node with\nchosen terminal payoff", "shape": "rect", "note": "Treat this node as resolved by replacing it with the payoff vector of the chosen action. This simplifies the tree for further backward induction."}, {"id": "done", "label": "Only root remains?", "shape": "diamond", "note": "Check if the entire game tree has been resolved. If only the root remains (or the root itself has been resolved), backward induction is complete."}, {"id": "speout", "label": "SPE found:\nstrategy profile complete", "shape": "terminal", "variant": "success", "note": "The collected action choices at every node form the unique subgame-perfect equilibrium strategy profile. Every NE involving non-credible threats has been ruled out."}], "edges": [{"from": "start", "to": "leaves"}, {"from": "leaves", "to": "parent"}, {"from": "parent", "to": "whose"}, {"from": "whose", "to": "bestact"}, {"from": "bestact", "to": "resolve"}, {"from": "resolve", "to": "done"}, {"from": "done", "to": "parent", "label": "No"}, {"from": "done", "to": "speout", "label": "Yes"}]}, {"id": "chart-3", "type": "flowchart", "title": "Is a Nash Equilibrium Subgame-Perfect?", "description": "Decision procedure for checking whether a given NE involves non-credible threats and is therefore not an SPE.", "nodes": [{"id": "start", "label": "Start: Nash equilibrium\nstrategy profile s", "shape": "terminal", "variant": "start", "note": "We have a candidate Nash equilibrium for an extensive form game and want to determine whether it is also a subgame-perfect equilibrium."}, {"id": "subgames", "label": "Enumerate all\nsubgames of the game", "shape": "rect", "note": "A subgame is the restriction of the game tree to the descendants of some non-terminal node. For perfect information games, every non-terminal node defines a subgame."}, {"id": "nextsg", "label": "Select next\nunverified subgame G'", "shape": "rect", "note": "Pick any subgame that has not yet been checked. The whole game is also a subgame."}, {"id": "restrict", "label": "Restrict s to G':\nget strategy profile s'", "shape": "rect", "note": "Extract the part of the strategy profile s that applies to nodes within subgame G'. This gives a strategy profile s' for the subgame."}, {"id": "isne", "label": "Is s' a Nash\nequilibrium of G'?", "shape": "diamond", "note": "Check whether s' is a Nash equilibrium within G': no player in G' can benefit by deviating unilaterally given the others' strategies in G'. If not, s involves a non-credible threat in G'."}, {"id": "more", "label": "More subgames\nto check?", "shape": "diamond", "note": "If s' was a NE of G', move to the next subgame. Once all subgames have been verified, s is an SPE."}, {"id": "isspe", "label": "s IS an SPE", "shape": "terminal", "variant": "success", "note": "The strategy profile is rational in every subgame. It is a subgame-perfect equilibrium, free from non-credible threats."}, {"id": "notspe", "label": "s is NOT an SPE\nNon-credible threat in G'", "shape": "terminal", "variant": "failure", "note": "At least one subgame has a player who would deviate, meaning the strategy involves a non-credible threat. The equilibrium relies on a promise the player would not keep."}], "edges": [{"from": "start", "to": "subgames"}, {"from": "subgames", "to": "nextsg"}, {"from": "nextsg", "to": "restrict"}, {"from": "restrict", "to": "isne"}, {"from": "isne", "to": "more", "label": "Yes"}, {"from": "isne", "to": "notspe", "label": "No"}, {"from": "more", "to": "nextsg", "label": "Yes"}, {"from": "more", "to": "isspe", "label": "No"}]}, {"id": "chart-4", "type": "flowchart", "title": "Cooperation via Grim Trigger in Infinitely Repeated Game", "description": "Decision procedure for determining whether mutual cooperation is sustainable as an SPE in an infinitely repeated Prisoner's Dilemma using the grim trigger strategy.", "nodes": [{"id": "start", "label": "Start: stage game payoffs\nand continuation prob p", "shape": "terminal", "variant": "start", "note": "We have an infinitely repeated Prisoner's Dilemma. The stage game has payoffs: mutual cooperation gives R each, mutual defection gives P each, defecting against a cooperator gives T (temptation), cooperating against a defector gives S. The game continues after each round with probability p."}, {"id": "coop", "label": "Compute payoff:\nalways cooperate vs trigger", "shape": "rect", "note": "If both players use the trigger strategy and cooperate, the expected total payoff is R / (1-p) (geometric series). This is the cooperation payoff."}, {"id": "defect", "label": "Compute payoff:\ndefect once then punished", "shape": "rect", "note": "If a player defects once, they get T in round 1 (exploiting cooperator), then both defect forever giving P per round. Total payoff: T + p * P / (1-p)."}, {"id": "compare", "label": "Cooperation payoff\ngreater or equal\nto defection payoff?", "shape": "diamond", "note": "Compare the cooperation payoff R/(1-p) against the deviation payoff T + p*P/(1-p). Cooperation is sustainable if and only if the cooperation payoff is at least as large."}, {"id": "solvep", "label": "Solve for threshold\np* from the inequality", "shape": "rect", "note": "Rearrange the inequality to isolate p. The result gives a critical probability p* such that cooperation is sustainable when p is at least p*."}, {"id": "check", "label": "Is actual p\nabove threshold p*?", "shape": "diamond", "note": "Compare the given continuation probability p to the threshold p*. If p is at or above p*, the future payoff from sustained cooperation is worth more than one-time defection."}, {"id": "cansust", "label": "Cooperation IS\nsustainable as SPE", "shape": "terminal", "variant": "success", "note": "The grim trigger strategy constitutes a subgame-perfect equilibrium. Both players cooperate in every round, and neither has an incentive to deviate given the threat of permanent punishment."}, {"id": "cantsust", "label": "Cooperation NOT\nsustainable; always defect", "shape": "terminal", "variant": "failure", "note": "The continuation probability is too low for future punishment to deter defection. The unique SPE has both players defecting in every round, as in the one-shot game."}], "edges": [{"from": "start", "to": "coop"}, {"from": "coop", "to": "defect"}, {"from": "defect", "to": "compare"}, {"from": "compare", "to": "solvep", "label": "Solve"}, {"from": "solvep", "to": "check"}, {"from": "check", "to": "cansust", "label": "Yes"}, {"from": "check", "to": "cantsust", "label": "No"}, {"from": "compare", "to": "cansust", "label": "Always"}]}]};

// ═════════════════════════════════════════════════════════════════════════════
// TEXT MEASUREMENT
// ═════════════════════════════════════════════════════════════════════════════
const _c = document.createElement('canvas').getContext('2d');
function measure(text, fs = 13, fw = '500') {
  _c.font = `${fw} ${fs}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;
  const lines = String(text).split('\n');
  return {
    w: Math.max(...lines.map(l => _c.measureText(l).width)),
    h: lines.length * (fs * 1.45),
    lines,
  };
}

// ═════════════════════════════════════════════════════════════════════════════
// SVG + ZOOM
// ═════════════════════════════════════════════════════════════════════════════
const svg   = d3.select('#diagram-svg');
const root  = svg.append('g').attr('id', 'root-layer');

const zoom = d3.zoom()
  .scaleExtent([0.04, 12])
  .on('zoom', ev => root.attr('transform', ev.transform));

svg.call(zoom)
   .on('dblclick.zoom', () => fitAll());

function fitAll() {
  const svgEl = svg.node();
  const W = svgEl.clientWidth  || 900;
  const H = svgEl.clientHeight || 600;
  const bb = root.node().getBBox();
  if (!bb.width || !bb.height) return;
  const scale = Math.min(0.88 * W / bb.width, 0.88 * H / bb.height, 4);
  const tx = W / 2 - (bb.x + bb.width  / 2) * scale;
  const ty = H / 2 - (bb.y + bb.height / 2) * scale;
  svg.transition().duration(380)
     .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

document.getElementById('btn-zi').addEventListener('click', () =>
  svg.transition().duration(220).call(zoom.scaleBy, 1.45));
document.getElementById('btn-zo').addEventListener('click', () =>
  svg.transition().duration(220).call(zoom.scaleBy, 0.69));
document.getElementById('btn-zr').addEventListener('click', fitAll);

// INFO PANEL
// ═════════════════════════════════════════════════════════════════════════════
const infoPanel = document.getElementById('info-panel');
const infoLabel = document.getElementById('info-node-label');
const infoBadge = document.getElementById('info-node-badge');
const infoNote  = document.getElementById('info-note-text');
const hintEl    = document.getElementById('hint');

function badgeFor(node, depth) {
  if (depth !== undefined) {
    // Mindmap node
    if (depth === 0) return { text: 'Root',      cls: 'badge-start' };
    if (depth === 1) return { text: 'Main Topic', cls: 'badge-topic' };
    return               { text: 'Sub-topic',   cls: 'badge-subtopic' };
  }
  if (node.shape === 'diamond')                    return { text: 'Decision',    cls: 'badge-decision' };
  if (node.shape === 'terminal' && node.variant === 'success') return { text: 'Success',    cls: 'badge-success'  };
  if (node.shape === 'terminal' && node.variant === 'failure') return { text: 'Failure',    cls: 'badge-failure'  };
  if (node.shape === 'terminal')                   return { text: 'Start / End', cls: 'badge-start'    };
  return                                                   { text: 'Step',       cls: 'badge-step'     };
}

function showInfo(node, depth) {
  const label = (node.label || '').replace(/\n/g, ' ');
  infoLabel.textContent = label;

  const b = badgeFor(node, depth);
  infoBadge.textContent  = b.text;
  infoBadge.className    = 'badge-class ' + b.cls; // reset then set

  if (node.note) {
    infoNote.textContent = node.note;
    infoNote.className   = '';
  } else {
    infoNote.textContent = 'No description available for this node.';
    infoNote.className   = 'empty';
  }

  infoPanel.classList.add('visible');
  hintEl.classList.add('hidden');
}

function hideInfo() {
  infoPanel.classList.remove('visible');
  hintEl.classList.remove('hidden');
}

document.getElementById('info-close').addEventListener('click', hideInfo);
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideInfo(); });

// Click on SVG background closes panel
svg.on('click', (event) => {
  if (event.target === svg.node() || event.target.id === 'root-layer') hideInfo();
});

// ═════════════════════════════════════════════════════════════════════════════
// SIDEBAR
// ═════════════════════════════════════════════════════════════════════════════
document.getElementById('sb-module').textContent = DATA.module;
document.getElementById('sb-week'  ).textContent = 'Week ' + DATA.week;
document.getElementById('sb-title' ).textContent = DATA.title;
document.getElementById('sb-count' ).textContent =
  DATA.charts.length + ' chart' + (DATA.charts.length !== 1 ? 's' : '');

const ICONS = { mindmap: '🧠', flowchart: '📊', graph: '🔗' };
const listEl = document.getElementById('chart-list');
let firstSel = null;

DATA.charts.forEach((chart, i) => {
  const el = document.createElement('div');
  el.className = 'chart-item';
  el.innerHTML =
    `<span class="ci-icon">${ICONS[chart.type] || '📋'}</span>
     <div>
       <div class="ci-title">${chart.title}</div>
       <div class="ci-type">${chart.type}</div>
     </div>`;
  el.addEventListener('click', () => selectChart(chart, el));
  listEl.appendChild(el);
  if (i === 0) firstSel = { chart, el };
});

// ═════════════════════════════════════════════════════════════════════════════
// SELECTION
// ═════════════════════════════════════════════════════════════════════════════
function selectChart(chart, itemEl) {
  document.querySelectorAll('.chart-item').forEach(e => e.classList.remove('active'));
  itemEl.classList.add('active');
  document.getElementById('chart-title-el').textContent = chart.title;
  document.getElementById('chart-desc-el' ).textContent = chart.description || '';

  root.selectAll('*').remove();

  if (chart.type === 'mindmap') renderMindmap(chart);
  else                          renderFlowchart(chart);
}

// ═════════════════════════════════════════════════════════════════════════════
// MINDMAP  (D3 radial tree)
// ═════════════════════════════════════════════════════════════════════════════
function renderMindmap(chart) {
  const svgW = svg.node().clientWidth  || 900;
  const svgH = svg.node().clientHeight || 600;
  const R    = Math.min(svgW, svgH) * 0.40;

  // Build parent-child map
  const byId  = Object.fromEntries(chart.nodes.map(n => [n.id, { ...n, _children: [] }]));
  const hasParent = new Set(chart.edges.map(e => e.to));
  chart.edges.forEach(e => { if (byId[e.from] && byId[e.to]) byId[e.from]._children.push(byId[e.to]); });
  const rootNode = chart.nodes.find(n => !hasParent.has(n.id)) || chart.nodes[0];

  // D3 hierarchy + radial tree
  const hier = d3.hierarchy(byId[rootNode.id], d => d._children.length ? d._children : null);
  d3.tree()
    .size([2 * Math.PI, R])
    .separation((a, b) => (a.parent === b.parent ? 1.2 : 2.4) / a.depth)
    (hier);

  // ── Defs: drop shadow ──────────────────────────────────────────────────────
  const defs = root.append('defs');
  const filt = defs.append('filter').attr('id', 'mm-shadow').attr('x', '-20%').attr('y', '-20%').attr('width', '140%').attr('height', '140%');
  filt.append('feDropShadow').attr('dx', 0).attr('dy', 2).attr('stdDeviation', 4).attr('flood-color', '#000').attr('flood-opacity', 0.5);

  // ── Group centered ─────────────────────────────────────────────────────────
  const grp = root.append('g').attr('transform', `translate(${svgW / 2},${svgH / 2})`);

  // ── Links ──────────────────────────────────────────────────────────────────
  const linkRadial = d3.linkRadial().angle(d => d.x).radius(d => d.y);

  grp.append('g').selectAll('path')
    .data(hier.links())
    .join('path')
    .attr('d', linkRadial)
    .attr('fill', 'none')
    .attr('stroke', d => C.levels[Math.min(d.target.depth - 1, C.levels.length - 1)])
    .attr('stroke-width', d => Math.max(1, 3 - d.target.depth * 0.8))
    .attr('opacity', 0.4)
    .attr('stroke-linecap', 'round');

  // ── Nodes ──────────────────────────────────────────────────────────────────
  const nodeG = grp.append('g').selectAll('g')
    .data(hier.descendants())
    .join('g')
    .attr('transform', d => {
      const a = d.x - Math.PI / 2;
      return `translate(${d.y * Math.cos(a)},${d.y * Math.sin(a)})`;
    })
    .style('cursor', 'default');

  nodeG.each(function(d) {
    const g      = d3.select(this);
    const depth  = d.depth;
    const label  = d.data.label || '';
    const color  = depth === 0 ? C.levels[0] : C.levels[Math.min(depth - 1, C.levels.length - 1)];
    const fs     = depth === 0 ? 15 : depth === 1 ? 12.5 : 11;
    const fw     = depth <= 1 ? '700' : '500';
    const m      = measure(label, fs, fw);
    const px     = depth === 0 ? 18 : 12;
    const py     = depth === 0 ? 12 : 8;
    const rw     = m.w + px * 2;
    const rh     = m.h + py * 2;

    if (depth === 0) {
      // Root: filled pill with glow
      g.append('rect')
        .attr('x', -rw / 2).attr('y', -rh / 2)
        .attr('width', rw).attr('height', rh)
        .attr('rx', rh / 2)
        .attr('fill', color)
        .attr('filter', 'url(#mm-shadow)');
    } else {
      // Child: bordered pill
      g.append('rect')
        .attr('x', -rw / 2).attr('y', -rh / 2)
        .attr('width', rw).attr('height', rh)
        .attr('rx', Math.min(rh / 2, 10))
        .attr('fill', color + '18')
        .attr('stroke', color)
        .attr('stroke-width', 1.5);
    }

    // Text
    m.lines.forEach((line, i) => {
      const yOff = (i - (m.lines.length - 1) / 2) * (fs * 1.45);
      g.append('text')
        .text(line)
        .attr('y', yOff)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', fs + 'px')
        .attr('font-weight', fw)
        .attr('fill', depth === 0 ? '#fff' : color)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    });

    // Hover + click
    const shapeEl = g.select(depth === 0 ? 'rect' : 'rect');
    g.style('cursor', 'pointer')
     .on('mouseenter', function() {
        shapeEl.transition().duration(120)
          .attr('fill', depth === 0 ? d3.color(color).brighter(0.3) : color + '32');
      })
     .on('mouseleave', function() {
        shapeEl.transition().duration(120)
          .attr('fill', depth === 0 ? color : color + '18');
      })
     .on('click', function(event) {
        event.stopPropagation();
        showInfo(d.data, depth);
      });
  });

  setTimeout(fitAll, 60);
}

// ═════════════════════════════════════════════════════════════════════════════
// FLOWCHART  (Dagre layout + custom D3 SVG)
// ═════════════════════════════════════════════════════════════════════════════
function renderFlowchart(chart) {
  const FS    = 13;
  const PX    = 22;
  const PY    = 13;
  const DPAD  = 1.5; // diamond size multiplier

  // ── Compute node sizes ────────────────────────────────────────────────────
  const info = {};
  chart.nodes.forEach(n => {
    const m  = measure(n.label || '', FS);
    let w    = Math.max(m.w + PX * 2, 90);
    let h    = Math.max(m.h + PY * 2, 38);
    if (n.shape === 'diamond') { w = (w + 20) * DPAD; h = (h + 10) * DPAD; }
    info[n.id] = { ...m, w, h };
  });

  // ── Dagre graph ───────────────────────────────────────────────────────────
  const gd = new dagre.graphlib.Graph({ multigraph: true });
  gd.setGraph({ rankdir: 'TB', nodesep: 55, ranksep: 75, marginx: 50, marginy: 50, edgesep: 20 });
  gd.setDefaultEdgeLabel(() => ({}));

  chart.nodes.forEach(n  => gd.setNode(n.id, { width: info[n.id].w, height: info[n.id].h }));
  chart.edges.forEach((e, i) => gd.setEdge(e.from, e.to, { label: e.label || '' }, 'e' + i));

  dagre.layout(gd);

  // ── Defs ──────────────────────────────────────────────────────────────────
  const defs  = root.append('defs');

  // Arrowhead
  defs.append('marker')
    .attr('id', 'arr').attr('viewBox', '0 -5 10 10')
    .attr('refX', 8).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', C.arrow);

  // Glow filter for highlighted nodes
  const glow = defs.append('filter').attr('id', 'glow').attr('x', '-30%').attr('y', '-30%').attr('width', '160%').attr('height', '160%');
  glow.append('feGaussianBlur').attr('in', 'SourceGraphic').attr('stdDeviation', '3').attr('result', 'blur');
  glow.append('feComposite').attr('in', 'SourceGraphic').attr('in2', 'blur').attr('operator', 'over');

  // ── Edges ─────────────────────────────────────────────────────────────────
  const edgeG = root.append('g').attr('class', 'edges');
  const lineGen = d3.line().curve(d3.curveCatmullRom.alpha(0.5))
    .x(d => d.x).y(d => d.y);

  gd.edges().forEach(e => {
    const ed  = gd.edge(e);
    if (!ed || !ed.points || ed.points.length < 2) return;
    const pts = ed.points;

    edgeG.append('path')
      .attr('d', lineGen(pts))
      .attr('fill', 'none')
      .attr('stroke', C.edge)
      .attr('stroke-width', 1.5)
      .attr('stroke-linecap', 'round')
      .attr('marker-end', 'url(#arr)');

    if (ed.label) {
      const mid = pts[Math.floor(pts.length / 2)];
      edgeG.append('text')
        .text(ed.label)
        .attr('x', mid.x + 6).attr('y', mid.y - 5)
        .attr('font-size', '11px')
        .attr('font-weight', '600')
        .attr('fill', C.edgeLabel)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    }
  });

  // ── Nodes ─────────────────────────────────────────────────────────────────
  const nodeG = root.append('g').attr('class', 'nodes');

  chart.nodes.forEach(n => {
    const pos    = gd.node(n.id);
    if (!pos) return;
    const ninfo  = info[n.id];
    const w      = pos.width;
    const h      = pos.height;
    const cx     = pos.x;
    const cy     = pos.y;

    // Pick colours
    let pal;
    if (n.shape === 'diamond')       pal = C.node.decision;
    else if (n.variant === 'success') pal = C.node.success;
    else if (n.variant === 'failure') pal = C.node.failure;
    else if (n.variant === 'start')   pal = C.node.start;
    else                              pal = C.node.default;

    const g = nodeG.append('g')
      .attr('transform', `translate(${cx - w/2},${cy - h/2})`)
      .style('cursor', 'default');

    // ── Shape ──────────────────────────────────────────────────────────────
    if (n.shape === 'diamond') {
      const hx = w / 2, hy = h / 2;
      g.append('polygon')
        .attr('points', `${hx},1 ${w-1},${hy} ${hx},${h-1} 1,${hy}`)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    } else if (n.shape === 'terminal') {
      g.append('rect')
        .attr('x', 0).attr('y', 0)
        .attr('width', w).attr('height', h)
        .attr('rx', h / 2)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    } else {
      g.append('rect')
        .attr('x', 0).attr('y', 0)
        .attr('width', w).attr('height', h)
        .attr('rx', 8)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    }

    // ── Label ──────────────────────────────────────────────────────────────
    const textG = g.append('g').attr('transform', `translate(${w/2},${h/2})`);
    ninfo.lines.forEach((line, li) => {
      textG.append('text')
        .text(line)
        .attr('y', (li - (ninfo.lines.length - 1) / 2) * (FS * 1.45))
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', FS + 'px')
        .attr('font-weight', n.shape === 'terminal' ? '700' : '500')
        .attr('fill', pal.text)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    });

    // ── Hover glow + click ─────────────────────────────────────────────────
    const shape = g.select(n.shape === 'diamond' ? 'polygon' : 'rect');
    g.style('cursor', 'pointer')
     .on('mouseenter', () => shape.attr('filter', 'url(#glow)').attr('stroke-width', 2.2))
     .on('mouseleave', () => shape.attr('filter', null).attr('stroke-width', 1.5))
     .on('click', function(event) {
        event.stopPropagation();
        showInfo(n);
      });
  });

  setTimeout(fitAll, 60);
}

// ═════════════════════════════════════════════════════════════════════════════
// INIT
// ═════════════════════════════════════════════════════════════════════════════
if (firstSel) setTimeout(() => selectChart(firstSel.chart, firstSel.el), 120);
</script>
