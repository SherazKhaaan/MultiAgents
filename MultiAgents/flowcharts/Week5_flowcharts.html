<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MultiAgents — Week 5: Hedonic Games, Stable Matchings, and House Allocation</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  display: flex;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
#sidebar {
  width: 268px;
  min-width: 268px;
  background: #161b22;
  border-right: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
.sb-module {
  font-size: 0.67rem;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 700;
  margin-bottom: 4px;
}
.sb-week  { font-size: 0.76rem; color: #8b949e; margin-bottom: 2px; }
.sb-title { font-size: 0.96rem; font-weight: 700; color: #f0f6fc; line-height: 1.35; }
.sb-count {
  display: inline-block;
  background: #21262d;
  color: #8b949e;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 8px;
  border: 1px solid #30363d;
}

#chart-list { padding: 8px 6px; flex: 1; overflow-y: auto; }
#chart-list::-webkit-scrollbar { width: 3px; }
#chart-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

.chart-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background 0.1s;
  color: #8b949e;
  user-select: none;
  border: 1px solid transparent;
}
.chart-item:hover { background: #21262d; color: #c9d1d9; }
.chart-item.active {
  background: #1f3a6e;
  color: #f0f6fc;
  border-color: #388bfd;
}
.chart-item.active .ci-type { color: #79c0ff; opacity: 1; }
.ci-icon  { font-size: 0.95rem; flex-shrink: 0; margin-top: 2px; }
.ci-title { font-size: 0.83rem; font-weight: 600; line-height: 1.3; }
.ci-type  { font-size: 0.66rem; opacity: 0.6; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.07em; }

/* ── Main ────────────────────────────────────────────────────────────────── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#chart-header {
  padding: 13px 22px 11px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
#chart-title-el { font-size: 1rem; font-weight: 700; color: #79c0ff; margin-bottom: 2px; }
#chart-desc-el  { font-size: 0.81rem; color: #8b949e; font-style: italic; }

#diagram-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #0d1117;
  background-image:
    radial-gradient(circle at 1px 1px, #21262d 1px, transparent 0);
  background-size: 24px 24px;
}

#diagram-svg { width: 100%; height: 100%; display: block; cursor: grab; }
#diagram-svg:active { cursor: grabbing; }

/* ── Zoom controls ───────────────────────────────────────────────────────── */
#zoom-controls {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  z-index: 10;
}
.zoom-btn {
  width: 32px;
  height: 32px;
  border: 1px solid #30363d;
  background: #161b22;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  transition: all 0.1s;
  color: #8b949e;
}
.zoom-btn:hover { background: #21262d; color: #79c0ff; border-color: #388bfd; }

/* ── Hint bar ────────────────────────────────────────────────────────────── */
#hint {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7rem;
  color: #484f58;
  pointer-events: none;
  white-space: nowrap;
  transition: opacity 0.2s;
}
#hint.hidden { opacity: 0; }

.state-msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #484f58;
  font-size: 0.9rem;
  text-align: center;
  pointer-events: none;
}
.state-msg.err { color: #f85149; }

/* ── Info panel (slides in from the left of the diagram area) ──────────── */
#info-panel {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  width: 440px;
  max-width: 50vw;
  background: #161b22;
  border-right: 1px solid #30363d;
  z-index: 30;
  transform: translateX(-100%);
  transition: transform 0.26s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  box-shadow: 12px 0 32px rgba(0, 0, 0, 0.45);
}
#info-panel.visible { transform: translateX(0); }

#info-panel-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
  position: relative;
}
#info-panel-header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}
#info-node-badge {
  font-size: 0.68rem;
  font-weight: 700;
  padding: 3px 11px;
  border-radius: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  flex-shrink: 0;
  display: inline-block;
}
#info-node-label {
  font-size: 1.25rem;
  font-weight: 700;
  color: #f0f6fc;
  line-height: 1.35;
  word-break: break-word;
}

.badge-decision { background: #2d2209; color: #e3b341; border: 1px solid #d29922; }
.badge-step     { background: #0d1f38; color: #79c0ff; border: 1px solid #388bfd; }
.badge-start    { background: #0d1f38; color: #79c0ff; border: 1px solid #388bfd; }
.badge-success  { background: #0d1f12; color: #56d364; border: 1px solid #3fb950; }
.badge-failure  { background: #1c0f0e; color: #ff7b72; border: 1px solid #f85149; }
.badge-topic    { background: #1a1036; color: #c084fc; border: 1px solid #a371f7; }
.badge-subtopic { background: #0d2020; color: #2dd4bf; border: 1px solid #14b8a6; }

#info-close {
  width: 30px;
  height: 30px;
  border: 1px solid #30363d;
  background: #0d1117;
  border-radius: 6px;
  cursor: pointer;
  color: #8b949e;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.1s;
}
#info-close:hover { background: #21262d; color: #f0f6fc; border-color: #8b949e; }

#info-panel-body {
  padding: 20px 24px 24px;
  overflow-y: auto;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: #30363d transparent;
}
#info-panel-body::-webkit-scrollbar { width: 6px; }
#info-panel-body::-webkit-scrollbar-track { background: transparent; }
#info-panel-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
#info-panel-body::-webkit-scrollbar-thumb:hover { background: #484f58; }

#info-section-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: #6e7681;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}
#info-note-text {
  font-size: 1rem;
  color: #c9d1d9;
  line-height: 1.75;
}
#info-note-text.empty {
  color: #484f58;
  font-style: italic;
}

<script>
// ═════════════════════════════════════════════════════════════════════════════

// ═════════════════════════════════════════════════════════════════════════════
const DATA = {"module": "MultiAgents", "week": 5, "title": "Hedonic Games, Stable Matchings, and House Allocation", "charts": [{"id": "chart-1", "type": "mindmap", "title": "Week 5 Topic Map", "description": "High-level overview of all major topics in Week 5.", "nodes": [{"id": "root", "label": "Week 5\nCooperative Games Part II", "note": "Week 5 covers non-transferable utility settings: hedonic games where payoff is determined solely by coalition membership, stable matchings between two groups, and house allocation algorithms including TTC."}, {"id": "ntu", "label": "Beyond TU:\nNTU Games", "note": "In NTU games, payoffs cannot be freely redistributed. Hedonic games are a special case where each player's utility depends only on which coalition they belong to, with no action choice within a coalition."}, {"id": "hedonic", "label": "Hedonic\nGames", "note": "A hedonic game has players with preferences over all coalitions they could belong to. The outcome is a partition of players into coalitions. No payoff distribution phase is needed."}, {"id": "compact", "label": "Compact\nRepresentations", "note": "Full hedonic preferences are exponential. Compact forms include: additively separable hedonic games (ASHG, utility = sum over partners), fractional games (average), and friends-and-enemies games."}, {"id": "stability", "label": "Stability in\nHedonic Games", "note": "Multiple stability concepts form a hierarchy from strongest to weakest: core stable, Nash stable, individually stable, contractual individually stable (CIS), and individually rational (IR). CIS and IR always exist; stronger concepts may not."}, {"id": "matching", "label": "Stable\nMatching", "note": "The stable matching problem matches two disjoint groups (e.g., men and women) with strict preferences. A matching is stable if no unmatched pair both prefer each other over their current partners (no blocking pair)."}, {"id": "gs", "label": "Gale-Shapley\nAlgorithm", "note": "The Gale-Shapley deferred acceptance algorithm (1962) always finds a stable matching in O(n^2) rounds. When men propose, it produces the man-optimal (and women-pessimal) stable matching."}, {"id": "strategy", "label": "Strategyproofness\nof GS", "note": "GS is strategyproof for the proposing side (men already get their best valid partner; no misreport helps). It is NOT strategyproof for the receiving side (women can benefit from misreporting)."}, {"id": "house", "label": "House\nAllocation", "note": "House allocation matches agents to houses in a one-sided market. Serial Dictatorship (strategyproof, PO, core stable) works without endowments. Top Trading Cycles (TTC) handles endowments and is also strategyproof, IR, PO, and in the core."}, {"id": "blockpair", "label": "Blocking Pairs\n& Valid Partners", "note": "A blocking pair in a matching is a man-woman pair who both prefer each other to their current partners. An agent's valid partners are those matched to them in some stable matching."}, {"id": "ttcalg", "label": "TTC Algorithm\n& Properties", "note": "TTC: each agent points to their favourite house; each house points to its owner. Extract and allocate cycles; repeat. TTC is individually rational, Pareto-optimal, core stable, and strategyproof."}, {"id": "sd", "label": "Serial\nDictatorship", "note": "SD: agents choose in a fixed order, each picking their favourite remaining house. SD is strategyproof, PO, and core stable, but not fair (first agent gets top choice)."}], "edges": [{"from": "root", "to": "ntu"}, {"from": "root", "to": "hedonic"}, {"from": "root", "to": "stability"}, {"from": "root", "to": "matching"}, {"from": "root", "to": "gs"}, {"from": "root", "to": "strategy"}, {"from": "root", "to": "house"}, {"from": "hedonic", "to": "compact"}, {"from": "matching", "to": "blockpair"}, {"from": "house", "to": "ttcalg"}, {"from": "house", "to": "sd"}]}, {"id": "chart-2", "type": "flowchart", "title": "Gale-Shapley Deferred Acceptance Algorithm", "description": "Men-proposing DA algorithm that finds the man-optimal stable matching.", "nodes": [{"id": "start", "label": "Start: n men, n women\nwith strict preferences", "shape": "terminal", "variant": "start", "note": "Each man has a strict ranking of all women; each woman has a strict ranking of all men. Being unmatched is worst for all. We want to find a stable matching."}, {"id": "init", "label": "All men unmatched;\nall proposals lists full", "shape": "rect", "note": "Initialise: every man is unmatched and has a full list of women to propose to in decreasing preference order."}, {"id": "unmatched", "label": "Any unmatched man\nwith women left to propose?", "shape": "diamond", "note": "Check if any man remains unmatched and has not yet proposed to all women. If yes, continue the algorithm. If no unmatched man remains (or all have exhausted their lists), we have a matching."}, {"id": "propose", "label": "Man m proposes to\nhis most preferred\nunproposed woman w", "shape": "rect", "note": "The man who is unmatched proposes to the highest-ranked woman he has not yet proposed to. He is then removed from her to-do list."}, {"id": "held", "label": "Does w currently\nhave a tentative partner?", "shape": "diamond", "note": "Check whether the woman w who received the proposal is already tentatively matched to someone else, or if she is currently unmatched."}, {"id": "compare", "label": "Does w prefer m\nover current partner m'?", "shape": "diamond", "note": "Women only upgrade: w compares new proposer m to her current tentative partner m'. If w prefers m, she switches; otherwise she rejects m."}, {"id": "accept", "label": "w tentatively\naccepts m; m' becomes free", "shape": "rect", "note": "Woman w drops her current partner m' (who becomes unmatched again) and tentatively accepts m. A woman can only get better or stay the same throughout the algorithm."}, {"id": "reject", "label": "w rejects m;\nm remains unmatched", "shape": "rect", "note": "Woman w prefers her current tentative partner, so she rejects m. Man m stays unmatched and will propose to his next preferred woman in the next round."}, {"id": "acceptnew", "label": "w tentatively\naccepts m (no current partner)", "shape": "rect", "note": "Woman w is currently unmatched, so she tentatively accepts any proposal. She can still be replaced by a better proposer later."}, {"id": "done", "label": "Man-optimal\nstable matching found", "shape": "terminal", "variant": "success", "note": "Every man is matched to his best valid partner (man-optimal). Every woman is matched to her worst valid partner (women-pessimal). The matching is guaranteed stable and produced in at most n^2 rounds."}], "edges": [{"from": "start", "to": "init"}, {"from": "init", "to": "unmatched"}, {"from": "unmatched", "to": "propose", "label": "Yes"}, {"from": "unmatched", "to": "done", "label": "No"}, {"from": "propose", "to": "held"}, {"from": "held", "to": "compare", "label": "Yes"}, {"from": "held", "to": "acceptnew", "label": "No"}, {"from": "compare", "to": "accept", "label": "Yes"}, {"from": "compare", "to": "reject", "label": "No"}, {"from": "accept", "to": "unmatched"}, {"from": "reject", "to": "unmatched"}, {"from": "acceptnew", "to": "unmatched"}]}, {"id": "chart-3", "type": "flowchart", "title": "Top Trading Cycles (TTC) Algorithm", "description": "Algorithm for house allocation with endowments that is IR, PO, core stable, and strategyproof.", "nodes": [{"id": "start", "label": "Start: agents own houses;\neach has preference ranking", "shape": "terminal", "variant": "start", "note": "Each agent owns one house and has strict preferences over all houses. We want a reallocation that respects individual rationality (no one ends up worse than their own house)."}, {"id": "point", "label": "Each agent points to\nmost preferred available house", "shape": "rect", "note": "In the current graph, every agent draws an edge to the house they like most among remaining (unallocated) houses. Every house draws an edge back to its current owner."}, {"id": "cycle", "label": "Find a cycle\nin the pointing graph", "shape": "rect", "note": "The graph has 2n vertices (n agents + n houses) and each has exactly one outgoing edge, so at least one cycle must exist. Find any such cycle."}, {"id": "allocate", "label": "Allocate: each agent\nin cycle gets pointed-to house", "shape": "rect", "note": "All agents in the cycle receive the house they are pointing to. This is their most preferred house from those remaining, so they are at least as happy as keeping their own house."}, {"id": "remove", "label": "Remove cycle agents\nand houses from graph", "shape": "rect", "note": "Remove the matched agents and houses from the market. The remaining agents form a smaller subproblem with the same structure."}, {"id": "remain", "label": "Any unmatched\nagents remaining?", "shape": "diamond", "note": "Check if all agents have been allocated a house. Since each cycle removes at least one agent-house pair, the algorithm terminates in at most n iterations."}, {"id": "done", "label": "TTC allocation\ncomplete", "shape": "terminal", "variant": "success", "note": "Every agent has been matched to a house. The resulting allocation is individually rational (no one gets a house they prefer less than their own), Pareto-optimal, in the core, and the mechanism is strategyproof."}], "edges": [{"from": "start", "to": "point"}, {"from": "point", "to": "cycle"}, {"from": "cycle", "to": "allocate"}, {"from": "allocate", "to": "remove"}, {"from": "remove", "to": "remain"}, {"from": "remain", "to": "point", "label": "Yes"}, {"from": "remain", "to": "done", "label": "No"}]}, {"id": "chart-4", "type": "flowchart", "title": "Stability Hierarchy in Hedonic Games", "description": "Chain of stability concepts from strongest (core stable) to weakest (individually rational), with existence guarantees.", "nodes": [{"id": "start", "label": "Hedonic game:\nfind stable partition", "shape": "terminal", "variant": "start", "note": "Given a hedonic game, we want to find a partition of players into coalitions satisfying a stability concept. Stronger concepts rule out more deviations but may not always exist."}, {"id": "core", "label": "Core Stable:\nno group can all\nbenefit by deviating", "shape": "rect", "note": "A partition is core stable if no group of players all prefer forming a coalition together over their current coalitions. This is the strongest stability concept but may not exist."}, {"id": "coreex", "label": "Core stable\noutcome exists?", "shape": "diamond", "note": "Check whether any partition is core stable. The core can be empty even in symmetric additively separable hedonic games."}, {"id": "nash", "label": "Nash Stable:\nno single player\nwants to move", "shape": "rect", "note": "A partition is Nash stable if no individual player prefers moving to another coalition (or being alone) over their current position. Nash stability implies individual rationality."}, {"id": "nashex", "label": "Nash stable\noutcome exists?", "shape": "diamond", "note": "Nash stable outcomes exist for symmetric ASHGs (every NS-deviation increases social welfare, so improvement dynamics converge). May not exist in general hedonic games."}, {"id": "cis", "label": "CIS: no player\nbenefits with consent\nof all involved", "shape": "rect", "note": "Contractual individual stability (CIS): a deviation requires the deviating player, the receiving coalition, and the leaving coalition to all weakly approve. CIS outcomes always exist."}, {"id": "ir", "label": "Individually Rational:\nno one prefers\nbeing alone", "shape": "terminal", "variant": "success", "note": "The weakest stability: every player weakly prefers their current coalition to being a singleton. IR outcomes always exist (e.g., the all-singletons partition satisfies IR trivially when singletons have zero utility)."}, {"id": "none", "label": "No stable outcome\nexists at this level", "shape": "terminal", "variant": "failure", "note": "The chosen stability concept is too strong for this game instance. The empty core or absence of Nash stable outcomes means we must fall back to a weaker concept."}], "edges": [{"from": "start", "to": "core"}, {"from": "core", "to": "coreex"}, {"from": "coreex", "to": "ir", "label": "Yes (core stable found)"}, {"from": "coreex", "to": "nash", "label": "No (core empty)"}, {"from": "nash", "to": "nashex"}, {"from": "nashex", "to": "ir", "label": "Yes (Nash stable found)"}, {"from": "nashex", "to": "cis", "label": "No"}, {"from": "cis", "to": "ir", "label": "CIS always exists"}, {"from": "nash", "to": "none", "label": "General game"}]}]};

// ═════════════════════════════════════════════════════════════════════════════
// TEXT MEASUREMENT
// ═════════════════════════════════════════════════════════════════════════════
const _c = document.createElement('canvas').getContext('2d');
function measure(text, fs = 13, fw = '500') {
  _c.font = `${fw} ${fs}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;
  const lines = String(text).split('\n');
  return {
    w: Math.max(...lines.map(l => _c.measureText(l).width)),
    h: lines.length * (fs * 1.45),
    lines,
  };
}

// ═════════════════════════════════════════════════════════════════════════════
// SVG + ZOOM
// ═════════════════════════════════════════════════════════════════════════════
const svg   = d3.select('#diagram-svg');
const root  = svg.append('g').attr('id', 'root-layer');

const zoom = d3.zoom()
  .scaleExtent([0.04, 12])
  .on('zoom', ev => root.attr('transform', ev.transform));

svg.call(zoom)
   .on('dblclick.zoom', () => fitAll());

function fitAll() {
  const svgEl = svg.node();
  const W = svgEl.clientWidth  || 900;
  const H = svgEl.clientHeight || 600;
  const bb = root.node().getBBox();
  if (!bb.width || !bb.height) return;
  const scale = Math.min(0.88 * W / bb.width, 0.88 * H / bb.height, 4);
  const tx = W / 2 - (bb.x + bb.width  / 2) * scale;
  const ty = H / 2 - (bb.y + bb.height / 2) * scale;
  svg.transition().duration(380)
     .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

document.getElementById('btn-zi').addEventListener('click', () =>
  svg.transition().duration(220).call(zoom.scaleBy, 1.45));
document.getElementById('btn-zo').addEventListener('click', () =>
  svg.transition().duration(220).call(zoom.scaleBy, 0.69));
document.getElementById('btn-zr').addEventListener('click', fitAll);

// INFO PANEL
// ═════════════════════════════════════════════════════════════════════════════
const infoPanel = document.getElementById('info-panel');
const infoLabel = document.getElementById('info-node-label');
const infoBadge = document.getElementById('info-node-badge');
const infoNote  = document.getElementById('info-note-text');
const hintEl    = document.getElementById('hint');

function badgeFor(node, depth) {
  if (depth !== undefined) {
    // Mindmap node
    if (depth === 0) return { text: 'Root',      cls: 'badge-start' };
    if (depth === 1) return { text: 'Main Topic', cls: 'badge-topic' };
    return               { text: 'Sub-topic',   cls: 'badge-subtopic' };
  }
  if (node.shape === 'diamond')                    return { text: 'Decision',    cls: 'badge-decision' };
  if (node.shape === 'terminal' && node.variant === 'success') return { text: 'Success',    cls: 'badge-success'  };
  if (node.shape === 'terminal' && node.variant === 'failure') return { text: 'Failure',    cls: 'badge-failure'  };
  if (node.shape === 'terminal')                   return { text: 'Start / End', cls: 'badge-start'    };
  return                                                   { text: 'Step',       cls: 'badge-step'     };
}

function showInfo(node, depth) {
  const label = (node.label || '').replace(/\n/g, ' ');
  infoLabel.textContent = label;

  const b = badgeFor(node, depth);
  infoBadge.textContent  = b.text;
  infoBadge.className    = 'badge-class ' + b.cls; // reset then set

  if (node.note) {
    infoNote.textContent = node.note;
    infoNote.className   = '';
  } else {
    infoNote.textContent = 'No description available for this node.';
    infoNote.className   = 'empty';
  }

  infoPanel.classList.add('visible');
  hintEl.classList.add('hidden');
}

function hideInfo() {
  infoPanel.classList.remove('visible');
  hintEl.classList.remove('hidden');
}

document.getElementById('info-close').addEventListener('click', hideInfo);
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideInfo(); });

// Click on SVG background closes panel
svg.on('click', (event) => {
  if (event.target === svg.node() || event.target.id === 'root-layer') hideInfo();
});

// ═════════════════════════════════════════════════════════════════════════════
// SIDEBAR
// ═════════════════════════════════════════════════════════════════════════════
document.getElementById('sb-module').textContent = DATA.module;
document.getElementById('sb-week'  ).textContent = 'Week ' + DATA.week;
document.getElementById('sb-title' ).textContent = DATA.title;
document.getElementById('sb-count' ).textContent =
  DATA.charts.length + ' chart' + (DATA.charts.length !== 1 ? 's' : '');

const ICONS = { mindmap: '🧠', flowchart: '📊', graph: '🔗' };
const listEl = document.getElementById('chart-list');
let firstSel = null;

DATA.charts.forEach((chart, i) => {
  const el = document.createElement('div');
  el.className = 'chart-item';
  el.innerHTML =
    `<span class="ci-icon">${ICONS[chart.type] || '📋'}</span>
     <div>
       <div class="ci-title">${chart.title}</div>
       <div class="ci-type">${chart.type}</div>
     </div>`;
  el.addEventListener('click', () => selectChart(chart, el));
  listEl.appendChild(el);
  if (i === 0) firstSel = { chart, el };
});

// ═════════════════════════════════════════════════════════════════════════════
// SELECTION
// ═════════════════════════════════════════════════════════════════════════════
function selectChart(chart, itemEl) {
  document.querySelectorAll('.chart-item').forEach(e => e.classList.remove('active'));
  itemEl.classList.add('active');
  document.getElementById('chart-title-el').textContent = chart.title;
  document.getElementById('chart-desc-el' ).textContent = chart.description || '';

  root.selectAll('*').remove();

  if (chart.type === 'mindmap') renderMindmap(chart);
  else                          renderFlowchart(chart);
}

// ═════════════════════════════════════════════════════════════════════════════
// MINDMAP  (D3 radial tree)
// ═════════════════════════════════════════════════════════════════════════════
function renderMindmap(chart) {
  const svgW = svg.node().clientWidth  || 900;
  const svgH = svg.node().clientHeight || 600;
  const R    = Math.min(svgW, svgH) * 0.40;

  // Build parent-child map
  const byId  = Object.fromEntries(chart.nodes.map(n => [n.id, { ...n, _children: [] }]));
  const hasParent = new Set(chart.edges.map(e => e.to));
  chart.edges.forEach(e => { if (byId[e.from] && byId[e.to]) byId[e.from]._children.push(byId[e.to]); });
  const rootNode = chart.nodes.find(n => !hasParent.has(n.id)) || chart.nodes[0];

  // D3 hierarchy + radial tree
  const hier = d3.hierarchy(byId[rootNode.id], d => d._children.length ? d._children : null);
  d3.tree()
    .size([2 * Math.PI, R])
    .separation((a, b) => (a.parent === b.parent ? 1.2 : 2.4) / a.depth)
    (hier);

  // ── Defs: drop shadow ──────────────────────────────────────────────────────
  const defs = root.append('defs');
  const filt = defs.append('filter').attr('id', 'mm-shadow').attr('x', '-20%').attr('y', '-20%').attr('width', '140%').attr('height', '140%');
  filt.append('feDropShadow').attr('dx', 0).attr('dy', 2).attr('stdDeviation', 4).attr('flood-color', '#000').attr('flood-opacity', 0.5);

  // ── Group centered ─────────────────────────────────────────────────────────
  const grp = root.append('g').attr('transform', `translate(${svgW / 2},${svgH / 2})`);

  // ── Links ──────────────────────────────────────────────────────────────────
  const linkRadial = d3.linkRadial().angle(d => d.x).radius(d => d.y);

  grp.append('g').selectAll('path')
    .data(hier.links())
    .join('path')
    .attr('d', linkRadial)
    .attr('fill', 'none')
    .attr('stroke', d => C.levels[Math.min(d.target.depth - 1, C.levels.length - 1)])
    .attr('stroke-width', d => Math.max(1, 3 - d.target.depth * 0.8))
    .attr('opacity', 0.4)
    .attr('stroke-linecap', 'round');

  // ── Nodes ──────────────────────────────────────────────────────────────────
  const nodeG = grp.append('g').selectAll('g')
    .data(hier.descendants())
    .join('g')
    .attr('transform', d => {
      const a = d.x - Math.PI / 2;
      return `translate(${d.y * Math.cos(a)},${d.y * Math.sin(a)})`;
    })
    .style('cursor', 'default');

  nodeG.each(function(d) {
    const g      = d3.select(this);
    const depth  = d.depth;
    const label  = d.data.label || '';
    const color  = depth === 0 ? C.levels[0] : C.levels[Math.min(depth - 1, C.levels.length - 1)];
    const fs     = depth === 0 ? 15 : depth === 1 ? 12.5 : 11;
    const fw     = depth <= 1 ? '700' : '500';
    const m      = measure(label, fs, fw);
    const px     = depth === 0 ? 18 : 12;
    const py     = depth === 0 ? 12 : 8;
    const rw     = m.w + px * 2;
    const rh     = m.h + py * 2;

    if (depth === 0) {
      // Root: filled pill with glow
      g.append('rect')
        .attr('x', -rw / 2).attr('y', -rh / 2)
        .attr('width', rw).attr('height', rh)
        .attr('rx', rh / 2)
        .attr('fill', color)
        .attr('filter', 'url(#mm-shadow)');
    } else {
      // Child: bordered pill
      g.append('rect')
        .attr('x', -rw / 2).attr('y', -rh / 2)
        .attr('width', rw).attr('height', rh)
        .attr('rx', Math.min(rh / 2, 10))
        .attr('fill', color + '18')
        .attr('stroke', color)
        .attr('stroke-width', 1.5);
    }

    // Text
    m.lines.forEach((line, i) => {
      const yOff = (i - (m.lines.length - 1) / 2) * (fs * 1.45);
      g.append('text')
        .text(line)
        .attr('y', yOff)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', fs + 'px')
        .attr('font-weight', fw)
        .attr('fill', depth === 0 ? '#fff' : color)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    });

    // Hover + click
    const shapeEl = g.select(depth === 0 ? 'rect' : 'rect');
    g.style('cursor', 'pointer')
     .on('mouseenter', function() {
        shapeEl.transition().duration(120)
          .attr('fill', depth === 0 ? d3.color(color).brighter(0.3) : color + '32');
      })
     .on('mouseleave', function() {
        shapeEl.transition().duration(120)
          .attr('fill', depth === 0 ? color : color + '18');
      })
     .on('click', function(event) {
        event.stopPropagation();
        showInfo(d.data, depth);
      });
  });

  setTimeout(fitAll, 60);
}

// ═════════════════════════════════════════════════════════════════════════════
// FLOWCHART  (Dagre layout + custom D3 SVG)
// ═════════════════════════════════════════════════════════════════════════════
function renderFlowchart(chart) {
  const FS    = 13;
  const PX    = 22;
  const PY    = 13;
  const DPAD  = 1.5; // diamond size multiplier

  // ── Compute node sizes ────────────────────────────────────────────────────
  const info = {};
  chart.nodes.forEach(n => {
    const m  = measure(n.label || '', FS);
    let w    = Math.max(m.w + PX * 2, 90);
    let h    = Math.max(m.h + PY * 2, 38);
    if (n.shape === 'diamond') { w = (w + 20) * DPAD; h = (h + 10) * DPAD; }
    info[n.id] = { ...m, w, h };
  });

  // ── Dagre graph ───────────────────────────────────────────────────────────
  const gd = new dagre.graphlib.Graph({ multigraph: true });
  gd.setGraph({ rankdir: 'TB', nodesep: 55, ranksep: 75, marginx: 50, marginy: 50, edgesep: 20 });
  gd.setDefaultEdgeLabel(() => ({}));

  chart.nodes.forEach(n  => gd.setNode(n.id, { width: info[n.id].w, height: info[n.id].h }));
  chart.edges.forEach((e, i) => gd.setEdge(e.from, e.to, { label: e.label || '' }, 'e' + i));

  dagre.layout(gd);

  // ── Defs ──────────────────────────────────────────────────────────────────
  const defs  = root.append('defs');

  // Arrowhead
  defs.append('marker')
    .attr('id', 'arr').attr('viewBox', '0 -5 10 10')
    .attr('refX', 8).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', C.arrow);

  // Glow filter for highlighted nodes
  const glow = defs.append('filter').attr('id', 'glow').attr('x', '-30%').attr('y', '-30%').attr('width', '160%').attr('height', '160%');
  glow.append('feGaussianBlur').attr('in', 'SourceGraphic').attr('stdDeviation', '3').attr('result', 'blur');
  glow.append('feComposite').attr('in', 'SourceGraphic').attr('in2', 'blur').attr('operator', 'over');

  // ── Edges ─────────────────────────────────────────────────────────────────
  const edgeG = root.append('g').attr('class', 'edges');
  const lineGen = d3.line().curve(d3.curveCatmullRom.alpha(0.5))
    .x(d => d.x).y(d => d.y);

  gd.edges().forEach(e => {
    const ed  = gd.edge(e);
    if (!ed || !ed.points || ed.points.length < 2) return;
    const pts = ed.points;

    edgeG.append('path')
      .attr('d', lineGen(pts))
      .attr('fill', 'none')
      .attr('stroke', C.edge)
      .attr('stroke-width', 1.5)
      .attr('stroke-linecap', 'round')
      .attr('marker-end', 'url(#arr)');

    if (ed.label) {
      const mid = pts[Math.floor(pts.length / 2)];
      edgeG.append('text')
        .text(ed.label)
        .attr('x', mid.x + 6).attr('y', mid.y - 5)
        .attr('font-size', '11px')
        .attr('font-weight', '600')
        .attr('fill', C.edgeLabel)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    }
  });

  // ── Nodes ─────────────────────────────────────────────────────────────────
  const nodeG = root.append('g').attr('class', 'nodes');

  chart.nodes.forEach(n => {
    const pos    = gd.node(n.id);
    if (!pos) return;
    const ninfo  = info[n.id];
    const w      = pos.width;
    const h      = pos.height;
    const cx     = pos.x;
    const cy     = pos.y;

    // Pick colours
    let pal;
    if (n.shape === 'diamond')       pal = C.node.decision;
    else if (n.variant === 'success') pal = C.node.success;
    else if (n.variant === 'failure') pal = C.node.failure;
    else if (n.variant === 'start')   pal = C.node.start;
    else                              pal = C.node.default;

    const g = nodeG.append('g')
      .attr('transform', `translate(${cx - w/2},${cy - h/2})`)
      .style('cursor', 'default');

    // ── Shape ──────────────────────────────────────────────────────────────
    if (n.shape === 'diamond') {
      const hx = w / 2, hy = h / 2;
      g.append('polygon')
        .attr('points', `${hx},1 ${w-1},${hy} ${hx},${h-1} 1,${hy}`)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    } else if (n.shape === 'terminal') {
      g.append('rect')
        .attr('x', 0).attr('y', 0)
        .attr('width', w).attr('height', h)
        .attr('rx', h / 2)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    } else {
      g.append('rect')
        .attr('x', 0).attr('y', 0)
        .attr('width', w).attr('height', h)
        .attr('rx', 8)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    }

    // ── Label ──────────────────────────────────────────────────────────────
    const textG = g.append('g').attr('transform', `translate(${w/2},${h/2})`);
    ninfo.lines.forEach((line, li) => {
      textG.append('text')
        .text(line)
        .attr('y', (li - (ninfo.lines.length - 1) / 2) * (FS * 1.45))
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', FS + 'px')
        .attr('font-weight', n.shape === 'terminal' ? '700' : '500')
        .attr('fill', pal.text)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    });

    // ── Hover glow + click ─────────────────────────────────────────────────
    const shape = g.select(n.shape === 'diamond' ? 'polygon' : 'rect');
    g.style('cursor', 'pointer')
     .on('mouseenter', () => shape.attr('filter', 'url(#glow)').attr('stroke-width', 2.2))
     .on('mouseleave', () => shape.attr('filter', null).attr('stroke-width', 1.5))
     .on('click', function(event) {
        event.stopPropagation();
        showInfo(n);
      });
  });

  setTimeout(fitAll, 60);
}

// ═════════════════════════════════════════════════════════════════════════════

// ═════════════════════════════════════════════════════════════════════════════
if (firstSel) setTimeout(() => selectChart(firstSel.chart, firstSel.el), 120);
</script>
