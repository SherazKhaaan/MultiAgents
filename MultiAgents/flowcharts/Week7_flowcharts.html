<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {

  height: 100vh;

  background: #0d1117;
  color: #e6edf3;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
#sidebar {
  width: 268px;
  min-width: 268px;
  background: #161b22;
  border-right: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
.sb-module {
  font-size: 0.67rem;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 700;
  margin-bottom: 4px;
}
.sb-week  { font-size: 0.76rem; color: #8b949e; margin-bottom: 2px; }
.sb-title { font-size: 0.96rem; font-weight: 700; color: #f0f6fc; line-height: 1.35; }
.sb-count {
  display: inline-block;
  background: #21262d;
  color: #8b949e;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 8px;
  border: 1px solid #30363d;
}

#chart-list { padding: 8px 6px; flex: 1; overflow-y: auto; }
#chart-list::-webkit-scrollbar { width: 3px; }
#chart-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

.chart-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background 0.1s;
  color: #8b949e;
  user-select: none;
  border: 1px solid transparent;
}
.chart-item:hover { background: #21262d; color: #c9d1d9; }
.chart-item.active {
  background: #1f3a6e;
  color: #f0f6fc;
  border-color: #388bfd;
}
.chart-item.active .ci-type { color: #79c0ff; opacity: 1; }
.ci-icon  { font-size: 0.95rem; flex-shrink: 0; margin-top: 2px; }
.ci-title { font-size: 0.83rem; font-weight: 600; line-height: 1.3; }
.ci-type  { font-size: 0.66rem; opacity: 0.6; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.07em; }

/* ── Main ────────────────────────────────────────────────────────────────── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#chart-header {
  padding: 13px 22px 11px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;

#chart-desc-el  { font-size: 0.81rem; color: #8b949e; font-style: italic; }

#diagram-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #0d1117;
  background-image:
    radial-gradient(circle at 1px 1px, #21262d 1px, transparent 0);
  background-size: 24px 24px;
}

#diagram-svg { width: 100%; height: 100%; display: block; cursor: grab; }
#diagram-svg:active { cursor: grabbing; }

/* ── Zoom controls ───────────────────────────────────────────────────────── */
#zoom-controls {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  z-index: 10;
}
.zoom-btn {
  width: 32px;
  height: 32px;
  border: 1px solid #30363d;
  background: #161b22;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  transition: all 0.1s;
  color: #8b949e;
}
.zoom-btn:hover { background: #21262d; color: #79c0ff; border-color: #388bfd; }

/* ── Hint bar ────────────────────────────────────────────────────────────── */
#hint {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7rem;
  color: #484f58;
  pointer-events: none;
  white-space: nowrap;
  transition: opacity 0.2s;
}
#hint.hidden { opacity: 0; }

.state-msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #484f58;
  font-size: 0.9rem;
  text-align: center;
  pointer-events: none;
}
.state-msg.err { color: #f85149; }

/* ── Info panel (slides in from the left of the diagram area) ──────────── */
#info-panel {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  width: 440px;
  max-width: 50vw;
  background: #161b22;
  border-right: 1px solid #30363d;
  z-index: 30;
  transform: translateX(-100%);
  transition: transform 0.26s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  box-shadow: 12px 0 32px rgba(0, 0, 0, 0.45);
}
#info-panel.visible { transform: translateX(0); }

#info-panel-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
  position: relative;
}
#info-panel-header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}
#info-node-badge {
  font-size: 0.68rem;
  font-weight: 700;
  padding: 3px 11px;
  border-radius: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  flex-shrink: 0;
  display: inline-block;
}
#info-node-label {
  font-size: 1.25rem;
  font-weight: 700;
  color: #f0f6fc;
  line-height: 1.35;
  word-break: break-word;

.badge-decision { background: #2d2209; color: #e3b341; border: 1px solid #d29922; }
.badge-step     { background: #0d1f38; color: #79c0ff; border: 1px solid #388bfd; }
.badge-start    { background: #0d1f38; color: #79c0ff; border: 1px solid #388bfd; }
.badge-success  { background: #0d1f12; color: #56d364; border: 1px solid #3fb950; }
.badge-failure  { background: #1c0f0e; color: #ff7b72; border: 1px solid #f85149; }
.badge-topic    { background: #1a1036; color: #c084fc; border: 1px solid #a371f7; }
.badge-subtopic { background: #0d2020; color: #2dd4bf; border: 1px solid #14b8a6; }

#info-close {
  width: 30px;
  height: 30px;
  border: 1px solid #30363d;
  background: #0d1117;
  border-radius: 6px;
  cursor: pointer;
  color: #8b949e;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.1s;
}
#info-close:hover { background: #21262d; color: #f0f6fc; border-color: #8b949e; }

#info-panel-body {
  padding: 20px 24px 24px;
  overflow-y: auto;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: #30363d transparent;
}
#info-panel-body::-webkit-scrollbar { width: 6px; }
#info-panel-body::-webkit-scrollbar-track { background: transparent; }
#info-panel-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

#info-section-label {

// ═════════════════════════════════════════════════════════════════════════════
const DATA = {"module": "MultiAgents", "week": 7, "title": "Fair Division — Divisible Goods and Cake Cutting", "charts": [{"id": "chart-1", "type": "mindmap", "title": "Week 7 Topic Map", "description": "High-level overview of all major topics in Week 7.", "nodes": [{"id": "root", "label": "Week 7\nCake Cutting & Fair Division", "note": "Week 7 introduces fair division for divisible goods (cake cutting). The cake is modelled as the unit interval with additive valuations. Core questions are which fairness criteria are achievable and what algorithms achieve them efficiently."}, {"id": "intro", "label": "Intro to\nFair Division", "note": "Fair division is a central MARA problem. Goods are classified by divisibility, temporal nature, sharability, and multiplicity. This week focuses on divisible, static, non-sharable goods in single units."}, {"id": "model", "label": "Cake Cutting\nModel", "note": "The cake is the unit interval [0,1]. Each player has an additive, normalised valuation function over pieces, satisfying divisibility. Players can have different preferences over parts of the cake."}, {"id": "concepts", "label": "Fairness\nCriteria", "note": "Four key criteria: proportionality (each agent gets at least 1/n value), envy-freeness (no agent prefers another's piece), equitability (all agents get equal value), Pareto-optimality (no Pareto improvement exists)."}, {"id": "relations", "label": "Relationships\nBetween Criteria", "note": "For 2 players, envy-freeness and proportionality are equivalent. For 3+ players, envy-freeness implies proportionality but not vice versa. Equitability and Pareto-optimality are independent of these."}, {"id": "rwmodel", "label": "Robertson-Webb\nQuery Model", "note": "Complexity of cake-cutting is measured by Eval queries (how much does agent i value interval [x,y]?) and Cut queries (find y such that agent i values [x,y] at alpha). These are the atomic operations."}, {"id": "cc", "label": "Cut-and-Choose\n(n=2)", "note": "Cut-and-Choose: player 1 cuts the cake in half (in their view); player 2 picks the preferred half. Achieves envy-freeness and proportionality with just 2 queries. Not equitable and not strategyproof."}, {"id": "ds", "label": "Dubins-Spanier\nMoving Knife", "note": "A referee moves a knife left to right; any player shouts Stop when the left piece is worth 1/n. They take it and exit. Guarantees proportionality in theta(n^2) queries. Not envy-free for n>2."}, {"id": "ep", "label": "Even-Paz\nDivide & Conquer", "note": "Each player marks where they see half the value; the median mark splits the players and cake. Recursed on each half. Achieves proportionality in optimal O(n log n) queries."}, {"id": "sc", "label": "Selfridge-Conway\n(n=3, Envy-Free)", "note": "Three-phase algorithm for exactly 3 players that guarantees envy-freeness. Much more complex than proportionality algorithms. Complexity is bounded constant."}, {"id": "nef", "label": "Envy-Free for\nGeneral n", "note": "Envy-free algorithms for n players exist (Aziz-Mackenzie 2016) but with astronomical complexity. The gap to the known lower bound of Omega(n^2) is unresolved."}, {"id": "sp", "label": "Strategyproofness\nImpossibility", "note": "No cake-cutting algorithm is simultaneously strategyproof, Pareto-optimal, and envy-free for 2+ agents. Cut-and-Choose, Dubins-Spanier, Even-Paz, and Selfridge-Conway are all not strategyproof."}], "edges": [{"from": "root", "to": "intro"}, {"from": "root", "to": "model"}, {"from": "root", "to": "concepts"}, {"from": "root", "to": "relations"}, {"from": "root", "to": "rwmodel"}, {"from": "root", "to": "cc"}, {"from": "root", "to": "ds"}, {"from": "root", "to": "ep"}, {"from": "root", "to": "sc"}, {"from": "root", "to": "nef"}, {"from": "root", "to": "sp"}]}, {"id": "chart-2", "type": "flowchart", "title": "Cut-and-Choose Algorithm (2 Players)", "description": "Simple 2-player cake cutting procedure achieving envy-freeness with 2 Robertson-Webb queries.", "nodes": [{"id": "start", "label": "Start: 2 players,\ncake [0,1]", "shape": "terminal", "variant": "start", "note": "We have two players each with additive normalised valuations over the cake. We want an envy-free, proportional allocation."}, {"id": "cut", "label": "Player 1 makes a Cut query:\nfind point where v1 = 1/2", "shape": "rect", "note": "Player 1 issues a Cut query to find the point x such that they value [0,x] at exactly 1/2. This creates two pieces they consider equal."}, {"id": "eval", "label": "Player 2 makes an Eval query:\ncompare v2([0,x]) vs v2([x,1])", "shape": "rect", "note": "Player 2 evaluates both pieces. They choose whichever piece they value more highly."}, {"id": "p2pref", "label": "Does Player 2\nprefer the left piece [0,x]?", "shape": "diamond", "note": "Player 2 compares their valuation of the two pieces and selects the one they prefer. In case of a tie, either piece can be allocated."}, {"id": "p2left", "label": "Allocate [0,x] to Player 2,\n[x,1] to Player 1", "shape": "terminal", "variant": "success", "note": "Player 2 gets their preferred piece. Player 1 gets the other. Since Player 1 valued both pieces equally, they do not envy Player 2 regardless of the choice."}, {"id": "p2right", "label": "Allocate [x,1] to Player 2,\n[0,x] to Player 1", "shape": "terminal", "variant": "success", "note": "Player 2 gets their preferred (right) piece. Player 1 gets the left piece. Both players are envy-free: Player 1 cut equally so doesn't envy; Player 2 got their top choice."}], "edges": [{"from": "start", "to": "cut"}, {"from": "cut", "to": "eval"}, {"from": "eval", "to": "p2pref"}, {"from": "p2pref", "to": "p2left", "label": "Yes"}, {"from": "p2pref", "to": "p2right", "label": "No"}]}, {"id": "chart-3", "type": "flowchart", "title": "Dubins-Spanier Moving Knife Algorithm", "description": "Proportional cake-cutting for n players using a moving knife; theta(n^2) queries.", "nodes": [{"id": "start", "label": "Start: n players,\nremainder [s,t]", "shape": "terminal", "variant": "start", "note": "We have n players remaining and a cake interval [s,t] to divide proportionally. Initially s=0, t=1."}, {"id": "move", "label": "Move knife from s\nrightward across [s,t]", "shape": "rect", "note": "A referee moves a knife continuously from left to right across the remaining piece [s,t]. Each player watches the piece to the left of the knife."}, {"id": "stop", "label": "Does any player shout\nStop! (left piece = 1/n)?", "shape": "diamond", "note": "A player shouts Stop when the piece to the left of the knife is worth exactly 1/n to them (their proportional share). Ties are broken arbitrarily."}, {"id": "alloc", "label": "Allocate left piece\nto shouting player; remove them", "shape": "rect", "note": "The shouting player receives the piece to the left of the knife. They are satisfied (proportional share) and exit the game."}, {"id": "last", "label": "Only one\nplayer left?", "shape": "diamond", "note": "Check if only one player remains. If so, they receive the rest of the cake. Their proportional share is at least 1/n by the argument that the knife would have stopped earlier otherwise."}, {"id": "remain", "label": "Remaining player\ngets [current s, t]", "shape": "terminal", "variant": "success", "note": "The last player gets the remaining piece. Since all previous pieces were worth at most 1/n to them (otherwise they would have shouted Stop earlier), the remainder is at least 1/n to them. Proportionality holds."}], "edges": [{"from": "start", "to": "move"}, {"from": "move", "to": "stop"}, {"from": "stop", "to": "alloc", "label": "Yes"}, {"from": "stop", "to": "move", "label": "No"}, {"from": "alloc", "to": "last"}, {"from": "last", "to": "remain", "label": "Yes"}, {"from": "last", "to": "move", "label": "No"}]}, {"id": "chart-4", "type": "flowchart", "title": "Even-Paz Divide-and-Conquer Algorithm", "description": "Optimal proportional cake-cutting in O(n log n) Robertson-Webb queries using divide-and-conquer.", "nodes": [{"id": "start", "label": "Start: n players,\ncake piece [s,t]", "shape": "terminal", "variant": "start", "note": "We have n players and a cake interval [s,t] to divide proportionally. The algorithm splits both players and cake in half at each step, achieving O(n log n) total queries."}, {"id": "basecase", "label": "Is n = 1?", "shape": "diamond", "note": "Base case: if only one player remains, they receive the entire current piece [s,t]. This is valid since they are guaranteed at least 1/n of the original cake by the induction argument."}, {"id": "allocall", "label": "Sole player\nreceives [s,t]", "shape": "terminal", "variant": "success", "note": "The single remaining player gets the whole remaining cake piece. Their proportional share is satisfied."}, {"id": "marks", "label": "Each player makes a\nCut: find midpoint of their value", "shape": "rect", "note": "Each player issues a Cut query to find the point z_i such that they value [s, z_i] at exactly half of their total valuation of [s,t]. This uses n Cut queries."}, {"id": "median", "label": "Find z*: the\nmedian mark (n/2-th from left)", "shape": "rect", "note": "Sort the n marks and find the median z*. This is the (n/2)-th mark from the left."}, {"id": "split", "label": "Left half n/2 players\nget [s,z*]; right get (z*,t]", "shape": "rect", "note": "The n/2 players with marks at or left of z* are assigned to piece [s, z*]. The other n/2 go to (z*, t]. Each group values their assigned half at at least half the piece value."}, {"id": "recurse", "label": "Recurse on each\nhalf independently", "shape": "rect", "note": "Apply Even-Paz recursively to each half. Each player is guaranteed at least 1/n of the original cake after log(n) levels of recursion."}, {"id": "done", "label": "Proportional allocation\ncomplete in O(n log n)", "shape": "terminal", "variant": "success", "note": "The recursion terminates with each player holding a piece worth at least 1/n. The total number of queries is O(n log n), which is optimal for proportional cake cutting."}], "edges": [{"from": "start", "to": "basecase"}, {"from": "basecase", "to": "allocall", "label": "Yes"}, {"from": "basecase", "to": "marks", "label": "No"}, {"from": "marks", "to": "median"}, {"from": "median", "to": "split"}, {"from": "split", "to": "recurse"}, {"from": "recurse", "to": "done"}]}, {"id": "chart-5", "type": "flowchart", "title": "Which Cake-Cutting Algorithm to Use?", "description": "Decision guide for selecting the appropriate algorithm based on the number of players and desired guarantee.", "nodes": [{"id": "start", "label": "How many\nplayers?", "shape": "terminal", "variant": "start", "note": "Choosing the right algorithm depends on the number of players, the desired fairness guarantee, and the acceptable computational cost."}, {"id": "two", "label": "Exactly\n2 players?", "shape": "diamond", "note": "Cut-and-Choose is optimal for 2 players: it achieves envy-freeness (hence proportionality) with only 2 Robertson-Webb queries."}, {"id": "three", "label": "Exactly\n3 players?", "shape": "diamond", "note": "For 3 players, if envy-freeness is required, Selfridge-Conway is the right choice. If proportionality suffices, Even-Paz is more efficient."}, {"id": "enfree", "label": "Envy-freeness\nrequired?", "shape": "diamond", "note": "Envy-freeness is much harder to achieve than proportionality. For n>=4 players, only Aziz-Mackenzie guarantees envy-freeness, but at astronomically high complexity."}, {"id": "cc", "label": "Use Cut-and-Choose:\n2 queries, EF + Proportional", "shape": "terminal", "variant": "success", "note": "Cut-and-Choose uses 1 Cut + 1 Eval query and guarantees envy-freeness for 2 players."}, {"id": "selfridge", "label": "Use Selfridge-Conway:\nconstant queries, EF for n=3", "shape": "terminal", "variant": "success", "note": "Selfridge-Conway achieves envy-freeness for exactly 3 players in a bounded constant number of queries."}, {"id": "evenpaz", "label": "Use Even-Paz:\nO(n log n), proportional, optimal", "shape": "terminal", "variant": "success", "note": "Even-Paz achieves proportionality in O(n log n) queries, which is optimal. It does not guarantee envy-freeness for n>2."}, {"id": "azizmac", "label": "Use Aziz-Mackenzie:\nenvy-free but huge complexity", "shape": "terminal", "note": "Aziz-Mackenzie guarantees envy-freeness for any n but has extremely high complexity. Practical for small n only."}], "edges": [{"from": "start", "to": "two"}, {"from": "two", "to": "cc", "label": "Yes"}, {"from": "two", "to": "three", "label": "No"}, {"from": "three", "to": "selfridge", "label": "Yes, EF needed"}, {"from": "three", "to": "evenpaz", "label": "No, proportional ok"}, {"from": "three", "to": "enfree", "label": "n > 3"}, {"from": "enfree", "to": "azizmac", "label": "Yes"}, {"from": "enfree", "to": "evenpaz", "label": "No"}]}]};

// TEXT MEASUREMENT
// ═════════════════════════════════════════════════════════════════════════════
const _c = document.createElement('canvas').getContext('2d');
function measure(text, fs = 13, fw = '500') {
  _c.font = `${fw} ${fs}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;
  const lines = String(text).split('\n');
  return {
    w: Math.max(...lines.map(l => _c.measureText(l).width)),
    h: lines.length * (fs * 1.45),
    lines,
  };
}

  .scaleExtent([0.04, 12])
  .on('zoom', ev => root.attr('transform', ev.transform));

svg.call(zoom)
   .on('dblclick.zoom', () => fitAll());

function fitAll() {
  const svgEl = svg.node();
  const W = svgEl.clientWidth  || 900;
  const H = svgEl.clientHeight || 600;
  const bb = root.node().getBBox();
  if (!bb.width || !bb.height) return;
  const scale = Math.min(0.88 * W / bb.width, 0.88 * H / bb.height, 4);
  const tx = W / 2 - (bb.x + bb.width  / 2) * scale;
  const ty = H / 2 - (bb.y + bb.height / 2) * scale;
  svg.transition().duration(380)
     .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

document.getElementById('btn-zi').addEventListener('click', () =>
  svg.transition().duration(220).call(zoom.scaleBy, 1.45));
document.getElementById('btn-zo').addEventListener('click', () =>
  svg.transition().duration(220).call(zoom.scaleBy, 0.69));
document.getElementById('btn-zr').addEventListener('click', fitAll);

// ═════════════════════════════════════════════════════════════════════════════
// INFO PANEL
// ═════════════════════════════════════════════════════════════════════════════
const infoPanel = document.getElementById('info-panel');
const infoLabel = document.getElementById('info-node-label');
const infoBadge = document.getElementById('info-node-badge');
const infoNote  = document.getElementById('info-note-text');
const hintEl    = document.getElementById('hint');

function badgeFor(node, depth) {
  if (depth !== undefined) {
    // Mindmap node
    if (depth === 0) return { text: 'Root',      cls: 'badge-start' };
    if (depth === 1) return { text: 'Main Topic', cls: 'badge-topic' };
    return               { text: 'Sub-topic',   cls: 'badge-subtopic' };
  }
  if (node.shape === 'diamond')                    return { text: 'Decision',    cls: 'badge-decision' };
  if (node.shape === 'terminal' && node.variant === 'success') return { text: 'Success',    cls: 'badge-success'  };
  if (node.shape === 'terminal' && node.variant === 'failure') return { text: 'Failure',    cls: 'badge-failure'  };
  if (node.shape === 'terminal')                   return { text: 'Start / End', cls: 'badge-start'    };
  return                                                   { text: 'Step',       cls: 'badge-step'     };
}

function showInfo(node, depth) {
  const label = (node.label || '').replace(/\n/g, ' ');
  infoLabel.textContent = label;

  const b = badgeFor(node, depth);
  infoBadge.textContent  = b.text;
  infoBadge.className    = 'badge-class ' + b.cls; // reset then set

  if (node.note) {
    infoNote.textContent = node.note;
    infoNote.className   = '';
  } else {
    infoNote.textContent = 'No description available for this node.';
    infoNote.className   = 'empty';
  }

  infoPanel.classList.add('visible');
  hintEl.classList.add('hidden');
}

function hideInfo() {
  infoPanel.classList.remove('visible');
  hintEl.classList.remove('hidden');
}

document.getElementById('info-close').addEventListener('click', hideInfo);
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideInfo(); });

// Click on SVG background closes panel
svg.on('click', (event) => {
  if (event.target === svg.node() || event.target.id === 'root-layer') hideInfo();
});

// ═════════════════════════════════════════════════════════════════════════════
// SIDEBAR
// ═════════════════════════════════════════════════════════════════════════════
document.getElementById('sb-module').textContent = DATA.module;
document.getElementById('sb-week'  ).textContent = 'Week ' + DATA.week;
document.getElementById('sb-title' ).textContent = DATA.title;
document.getElementById('sb-count' ).textContent =
  DATA.charts.length + ' chart' + (DATA.charts.length !== 1 ? 's' : '');

const ICONS = { mindmap: '🧠', flowchart: '📊', graph: '🔗' };
const listEl = document.getElementById('chart-list');
let firstSel = null;

DATA.charts.forEach((chart, i) => {
  const el = document.createElement('div');
  el.className = 'chart-item';
  el.innerHTML =
    `<span class="ci-icon">${ICONS[chart.type] || '📋'}</span>
     <div>
       <div class="ci-title">${chart.title}</div>
       <div class="ci-type">${chart.type}</div>
     </div>`;
  el.addEventListener('click', () => selectChart(chart, el));
  listEl.appendChild(el);
  if (i === 0) firstSel = { chart, el };
});

// ═════════════════════════════════════════════════════════════════════════════
// SELECTION
// ═════════════════════════════════════════════════════════════════════════════
function selectChart(chart, itemEl) {
  document.querySelectorAll('.chart-item').forEach(e => e.classList.remove('active'));
  itemEl.classList.add('active');
  document.getElementById('chart-title-el').textContent = chart.title;
  document.getElementById('chart-desc-el' ).textContent = chart.description || '';

  root.selectAll('*').remove();

  if (chart.type === 'mindmap') renderMindmap(chart);
  else                          renderFlowchart(chart);
}

// ═════════════════════════════════════════════════════════════════════════════
// MINDMAP  (D3 radial tree)
// ═════════════════════════════════════════════════════════════════════════════
function renderMindmap(chart) {
  const svgW = svg.node().clientWidth  || 900;
  const svgH = svg.node().clientHeight || 600;
  const R    = Math.min(svgW, svgH) * 0.40;

  // Build parent-child map
  const byId  = Object.fromEntries(chart.nodes.map(n => [n.id, { ...n, _children: [] }]));
  const hasParent = new Set(chart.edges.map(e => e.to));
  chart.edges.forEach(e => { if (byId[e.from] && byId[e.to]) byId[e.from]._children.push(byId[e.to]); });
  const rootNode = chart.nodes.find(n => !hasParent.has(n.id)) || chart.nodes[0];

  // D3 hierarchy + radial tree
  const hier = d3.hierarchy(byId[rootNode.id], d => d._children.length ? d._children : null);
  d3.tree()
    .size([2 * Math.PI, R])
    .separation((a, b) => (a.parent === b.parent ? 1.2 : 2.4) / a.depth)
    (hier);

  // ── Defs: drop shadow ──────────────────────────────────────────────────────
  const defs = root.append('defs');
  const filt = defs.append('filter').attr('id', 'mm-shadow').attr('x', '-20%').attr('y', '-20%').attr('width', '140%').attr('height', '140%');
  filt.append('feDropShadow').attr('dx', 0).attr('dy', 2).attr('stdDeviation', 4).attr('flood-color', '#000').attr('flood-opacity', 0.5);

  // ── Group centered ─────────────────────────────────────────────────────────
  const grp = root.append('g').attr('transform', `translate(${svgW / 2},${svgH / 2})`);

  // ── Links ──────────────────────────────────────────────────────────────────
  const linkRadial = d3.linkRadial().angle(d => d.x).radius(d => d.y);

  grp.append('g').selectAll('path')
    .data(hier.links())
    .join('path')
    .attr('d', linkRadial)
    .attr('fill', 'none')
    .attr('stroke', d => C.levels[Math.min(d.target.depth - 1, C.levels.length - 1)])
    .attr('stroke-width', d => Math.max(1, 3 - d.target.depth * 0.8))
    .attr('opacity', 0.4)
    .attr('stroke-linecap', 'round');

  // ── Nodes ──────────────────────────────────────────────────────────────────
  const nodeG = grp.append('g').selectAll('g')
    .data(hier.descendants())
    .join('g')
    .attr('transform', d => {
      const a = d.x - Math.PI / 2;
      return `translate(${d.y * Math.cos(a)},${d.y * Math.sin(a)})`;
    })
    .style('cursor', 'default');

  nodeG.each(function(d) {
    const g      = d3.select(this);
    const depth  = d.depth;
    const label  = d.data.label || '';
    const color  = depth === 0 ? C.levels[0] : C.levels[Math.min(depth - 1, C.levels.length - 1)];
    const fs     = depth === 0 ? 15 : depth === 1 ? 12.5 : 11;
    const fw     = depth <= 1 ? '700' : '500';
    const m      = measure(label, fs, fw);
    const px     = depth === 0 ? 18 : 12;
    const py     = depth === 0 ? 12 : 8;
    const rw     = m.w + px * 2;
    const rh     = m.h + py * 2;

    if (depth === 0) {
      // Root: filled pill with glow
      g.append('rect')
        .attr('x', -rw / 2).attr('y', -rh / 2)
        .attr('width', rw).attr('height', rh)
        .attr('rx', rh / 2)
        .attr('fill', color)
        .attr('filter', 'url(#mm-shadow)');
    } else {
      // Child: bordered pill
      g.append('rect')
        .attr('x', -rw / 2).attr('y', -rh / 2)
        .attr('width', rw).attr('height', rh)
        .attr('rx', Math.min(rh / 2, 10))
        .attr('fill', color + '18')
        .attr('stroke', color)
        .attr('stroke-width', 1.5);
    }

    // Text
    m.lines.forEach((line, i) => {
      const yOff = (i - (m.lines.length - 1) / 2) * (fs * 1.45);
      g.append('text')
        .text(line)
        .attr('y', yOff)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', fs + 'px')
        .attr('font-weight', fw)
        .attr('fill', depth === 0 ? '#fff' : color)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    });

    // Hover + click
    const shapeEl = g.select(depth === 0 ? 'rect' : 'rect');
    g.style('cursor', 'pointer')
     .on('mouseenter', function() {
        shapeEl.transition().duration(120)
          .attr('fill', depth === 0 ? d3.color(color).brighter(0.3) : color + '32');
      })
     .on('mouseleave', function() {
        shapeEl.transition().duration(120)
          .attr('fill', depth === 0 ? color : color + '18');
      })
     .on('click', function(event) {
        event.stopPropagation();
        showInfo(d.data, depth);
      });
  });

  setTimeout(fitAll, 60);
}

// ═════════════════════════════════════════════════════════════════════════════
// FLOWCHART  (Dagre layout + custom D3 SVG)
// ═════════════════════════════════════════════════════════════════════════════
function renderFlowchart(chart) {
  const FS    = 13;
  const PX    = 22;
  const PY    = 13;
  const DPAD  = 1.5; // diamond size multiplier

  // ── Compute node sizes ────────────────────────────────────────────────────
  const info = {};
  chart.nodes.forEach(n => {
    const m  = measure(n.label || '', FS);
    let w    = Math.max(m.w + PX * 2, 90);
    let h    = Math.max(m.h + PY * 2, 38);
    if (n.shape === 'diamond') { w = (w + 20) * DPAD; h = (h + 10) * DPAD; }
    info[n.id] = { ...m, w, h };
  });

  // ── Dagre graph ───────────────────────────────────────────────────────────
  const gd = new dagre.graphlib.Graph({ multigraph: true });
  gd.setGraph({ rankdir: 'TB', nodesep: 55, ranksep: 75, marginx: 50, marginy: 50, edgesep: 20 });
  gd.setDefaultEdgeLabel(() => ({}));

  chart.nodes.forEach(n  => gd.setNode(n.id, { width: info[n.id].w, height: info[n.id].h }));
  chart.edges.forEach((e, i) => gd.setEdge(e.from, e.to, { label: e.label || '' }, 'e' + i));

  dagre.layout(gd);

  // ── Defs ──────────────────────────────────────────────────────────────────
  const defs  = root.append('defs');

  // Arrowhead
  defs.append('marker')
    .attr('id', 'arr').attr('viewBox', '0 -5 10 10')
    .attr('refX', 8).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', C.arrow);

  // Glow filter for highlighted nodes
  const glow = defs.append('filter').attr('id', 'glow').attr('x', '-30%').attr('y', '-30%').attr('width', '160%').attr('height', '160%');
  glow.append('feGaussianBlur').attr('in', 'SourceGraphic').attr('stdDeviation', '3').attr('result', 'blur');
  glow.append('feComposite').attr('in', 'SourceGraphic').attr('in2', 'blur').attr('operator', 'over');

  // ── Edges ─────────────────────────────────────────────────────────────────
  const edgeG = root.append('g').attr('class', 'edges');
  const lineGen = d3.line().curve(d3.curveCatmullRom.alpha(0.5))
    .x(d => d.x).y(d => d.y);

  gd.edges().forEach(e => {
    const ed  = gd.edge(e);
    if (!ed || !ed.points || ed.points.length < 2) return;
    const pts = ed.points;

    edgeG.append('path')
      .attr('d', lineGen(pts))
      .attr('fill', 'none')
      .attr('stroke', C.edge)
      .attr('stroke-width', 1.5)
      .attr('stroke-linecap', 'round')
      .attr('marker-end', 'url(#arr)');

    if (ed.label) {
      const mid = pts[Math.floor(pts.length / 2)];
      edgeG.append('text')
        .text(ed.label)
        .attr('x', mid.x + 6).attr('y', mid.y - 5)
        .attr('font-size', '11px')
        .attr('font-weight', '600')
        .attr('fill', C.edgeLabel)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    }
  });

  // ── Nodes ─────────────────────────────────────────────────────────────────
  const nodeG = root.append('g').attr('class', 'nodes');

  chart.nodes.forEach(n => {
    const pos    = gd.node(n.id);
    if (!pos) return;
    const ninfo  = info[n.id];
    const w      = pos.width;
    const h      = pos.height;
    const cx     = pos.x;
    const cy     = pos.y;

    // Pick colours
    let pal;
    if (n.shape === 'diamond')       pal = C.node.decision;
    else if (n.variant === 'success') pal = C.node.success;
    else if (n.variant === 'failure') pal = C.node.failure;
    else if (n.variant === 'start')   pal = C.node.start;
    else                              pal = C.node.default;

    const g = nodeG.append('g')
      .attr('transform', `translate(${cx - w/2},${cy - h/2})`)
      .style('cursor', 'default');

    // ── Shape ──────────────────────────────────────────────────────────────
    if (n.shape === 'diamond') {
      const hx = w / 2, hy = h / 2;
      g.append('polygon')
        .attr('points', `${hx},1 ${w-1},${hy} ${hx},${h-1} 1,${hy}`)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    } else if (n.shape === 'terminal') {
      g.append('rect')
        .attr('x', 0).attr('y', 0)
        .attr('width', w).attr('height', h)
        .attr('rx', h / 2)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    } else {
      g.append('rect')
        .attr('x', 0).attr('y', 0)
        .attr('width', w).attr('height', h)
        .attr('rx', 8)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    }

    // ── Label ──────────────────────────────────────────────────────────────
    const textG = g.append('g').attr('transform', `translate(${w/2},${h/2})`);
    ninfo.lines.forEach((line, li) => {
      textG.append('text')
        .text(line)
        .attr('y', (li - (ninfo.lines.length - 1) / 2) * (FS * 1.45))
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', FS + 'px')
        .attr('font-weight', n.shape === 'terminal' ? '700' : '500')
        .attr('fill', pal.text)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    });

    // ── Hover glow + click ─────────────────────────────────────────────────
    const shape = g.select(n.shape === 'diamond' ? 'polygon' : 'rect');
    g.style('cursor', 'pointer')
     .on('mouseenter', () => shape.attr('filter', 'url(#glow)').attr('stroke-width', 2.2))
     .on('mouseleave', () => shape.attr('filter', null).attr('stroke-width', 1.5))
     .on('click', function(event) {
        event.stopPropagation();
        showInfo(n);
      });
  });

  setTimeout(fitAll, 60);
}
